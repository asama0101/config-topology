set system host-name r3
set interfaces lo0 unit 0 family inet address 10.255.0.3/32
set interfaces ge-0/0/1 unit 0 description link-to-r1
set interfaces ge-0/0/1 unit 0 family inet address 10.0.13.2/30
set protocols ospf area 0.0.0.1 interface ge-0/0/1.0
set protocols ospf area 0.0.0.1 interface lo0.0
set routing-options autonomous-system 65000
set routing-options router-id 10.255.0.3
set protocols bgp group IBGP type internal
set protocols bgp group IBGP local-address 10.255.0.3
set protocols bgp group IBGP peer-as 65000
set protocols bgp group IBGP neighbor 10.255.0.1
