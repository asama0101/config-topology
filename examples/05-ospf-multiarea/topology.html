<!doctype html>
<html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Network Topology</title><style>
/* ============================================================
   config-topology v2.0 design sample
   aesthetic: NOC instrument console (dark) / blueprint (light)
   ============================================================ */
:root, html[data-theme="dark"] {
  --bg: #10141a;
  --bg-dot: #1c232d;
  --panel: #171d26;
  --panel-edge: #232c38;
  --panel-glow: rgba(255,180,84,.04);
  --ink: #cfd8e3;
  --ink-dim: #7e8a99;
  --ink-faint: #4d5866;
  --accent: #ffb454;          /* selection amber */
  --search: #4fd6be;          /* search teal */
  --danger: #ff6b6b;
  --node-fill: #1d2630;
  --node-edge: #3d4d61;
  --node-ink: #e8eef5;
  --link: #54657a;
  --link-dim: #2c3743;
  --seg-fill: #1a2230;
  --lp-edge: #b07fd6; --lp-fill: #241a30;       /* loopback ノード（紫系） */
  --stub-edge: #6fae8f; --stub-fill: #16241d;   /* stub ノード（緑系） */
  --shadow: 0 10px 30px rgba(0,0,0,.45);
  --grid-size: 26px;
  --rr: #e0a44a;            /* Route Reflector amber ring */
}
html[data-theme="light"] {
  --bg: #eef0e9;
  --bg-dot: #d9dccf;
  --panel: #f7f8f2;
  --panel-edge: #c9cdbd;
  --panel-glow: rgba(36,64,128,.03);
  --ink: #232c38;
  --ink-dim: #5d6878;
  --ink-faint: #97a0ac;
  --accent: #d97706;
  --search: #0e8f7a;
  --danger: #c92a2a;
  --node-fill: #fdfdf8;
  --node-edge: #6b7a8d;
  --node-ink: #1b2430;
  --link: #7c8aa0;
  --link-dim: #c3cad4;
  --seg-fill: #eef1ea;
  --lp-edge: #8a5cd0; --lp-fill: #efe9f6;       /* loopback ノード（紫系） */
  --stub-edge: #3f8f6a; --stub-fill: #e8f2ec;   /* stub ノード（緑系） */
  --shadow: 0 8px 24px rgba(40,50,70,.18);
  --rr: #b5781f;            /* Route Reflector amber ring (light) */
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: ui-monospace, "Cascadia Mono", "SF Mono", Consolas, "Liberation Mono", monospace;
  font-size: 13px;
  background: var(--bg);
  color: var(--ink);
  overflow: hidden;
  display: flex; flex-direction: column;
}
button, input { font: inherit; color: inherit; }

/* ---------- header / toolbar ---------- */
header {
  display: flex; align-items: stretch; gap: 0;
  background: var(--panel);
  border-bottom: 1px solid var(--panel-edge);
  user-select: none;
}
.brand {
  padding: 10px 18px 10px 16px;
  border-right: 1px solid var(--panel-edge);
  display: flex; flex-direction: column; justify-content: center;
}
.brand b { font-size: 13px; letter-spacing: .14em; color: var(--accent); }
.brand span { font-size: 10px; color: var(--ink-faint); letter-spacing: .08em; }

nav.tabs { display: flex; align-items: stretch; }
nav.tabs button {
  background: none; border: none; cursor: pointer;
  padding: 0 20px; color: var(--ink-dim);
  letter-spacing: .12em; font-size: 12px;
  border-right: 1px solid var(--panel-edge);
  border-bottom: 2px solid transparent;
  position: relative;
}
nav.tabs button .k {
  position: absolute; top: 5px; right: 6px;
  font-size: 9px; color: var(--ink-faint);
  border: 1px solid var(--panel-edge); border-radius: 3px; padding: 0 3px;
}
nav.tabs button:hover { color: var(--ink); }
nav.tabs button.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
  background: var(--panel-glow);
}

.toolbar { flex: 1; display: flex; align-items: center; gap: 10px; padding: 8px 14px; flex-wrap: wrap; }
/* 検索対象フィールドのドロップダウン（host: 等を書かずに選択） */
.sfield {
  background: var(--bg); color: var(--ink-dim);
  border: 1px solid var(--panel-edge); border-radius: 6px;
  padding: 6px 4px; font-size: 12px; cursor: pointer; outline: none;
  margin-right: -4px;
}
.sfield:hover, .sfield:focus { color: var(--ink); border-color: var(--ink-faint); }
.searchbox { position: relative; }
.searchbox input {
  width: 240px; padding: 6px 28px 6px 30px;
  background: var(--bg); color: var(--ink);
  border: 1px solid var(--panel-edge); border-radius: 6px;
  outline: none;
}
.searchbox input:focus { border-color: var(--search); box-shadow: 0 0 0 2px color-mix(in srgb, var(--search) 25%, transparent); }
/* ヒット 0 件のときは検索欄を警告色に */
.searchbox input.nohit, .searchbox input.nohit:focus { border-color: var(--danger); box-shadow: 0 0 0 2px color-mix(in srgb, var(--danger) 25%, transparent); }
.searchbox input.nohit + .count { color: var(--danger); }
.searchbox::before {
  content: "⌕"; position: absolute; left: 9px; top: 50%; transform: translateY(-52%);
  color: var(--ink-faint); font-size: 15px;
}
.searchbox .count {
  position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
  font-size: 10px; color: var(--search);
}
.tbtn {
  background: var(--bg); border: 1px solid var(--panel-edge); border-radius: 6px;
  padding: 6px 10px; cursor: pointer; color: var(--ink-dim);
  letter-spacing: .04em; font-size: 12px;
}
.tbtn:hover { color: var(--ink); border-color: var(--ink-faint); }
.tbtn.on { color: var(--accent); border-color: var(--accent); }
.tgroup { display: flex; gap: 0; }
.tgroup .tbtn { border-radius: 0; border-right-width: 0; }
.tgroup .tbtn:first-child { border-radius: 6px 0 0 6px; }
.tgroup .tbtn:last-child { border-radius: 0 6px 6px 0; border-right-width: 1px; }
.tsep { width: 1px; align-self: stretch; background: var(--panel-edge); margin: 4px 2px; }
label.tchk {
  display: inline-flex; align-items: center; gap: 5px; cursor: pointer;
  color: var(--ink-dim); font-size: 11px; letter-spacing: .05em;
}
label.tchk input { accent-color: var(--accent); }
.kbd-hint { margin-left: auto; color: var(--ink-faint); font-size: 10px; letter-spacing: .05em; }
.kbd-hint b { color: var(--ink-dim); border: 1px solid var(--panel-edge); border-radius: 3px; padding: 0 4px; font-weight: normal; }

/* ---------- main layout ---------- */
main { flex: 1; display: flex; min-height: 0; position: relative; }
#stage { flex: 1; position: relative; min-width: 0; }
#canvas { width: 100%; height: 100%; display: block; cursor: grab; }
#canvas.dragging { cursor: grabbing; }
#canvas .bgrect { fill: url(#dotgrid); }

/* ---------- SVG elements ---------- */
.lk { stroke: var(--link); stroke-width: 2; fill: none; transition: stroke .15s, opacity .2s; }
.lk-hit { stroke: transparent; stroke-width: 14; fill: none; cursor: pointer; }
.lk.admin-down { stroke-dasharray: 7 6; opacity: .55; }
/* ライン hover 強調（ノード hover と同色＝--accent。選択/ライン選択より前に置き、それらを優先させる） */
.lk.lk-hover { stroke: var(--accent); stroke-width: 3; opacity: 1; filter: drop-shadow(0 0 6px color-mix(in srgb, var(--accent) 50%, transparent)); }
.lk.sel-edge { stroke: var(--accent); stroke-width: 3.5; }
.lk.sel-between { stroke: var(--accent); stroke-width: 5; filter: drop-shadow(0 0 6px color-mix(in srgb, var(--accent) 60%, transparent)); }
.lk.bgp-hot { stroke: var(--search); stroke-width: 4.5; filter: drop-shadow(0 0 7px color-mix(in srgb, var(--search) 70%, transparent)); }

.bgp-edge { stroke-width: 2.5; fill: none; stroke-dasharray: 1 0; opacity: .95; }
.bgp-edge.ibgp { stroke-dasharray: 6 4; stroke-linecap: round; }
/* ライン hover 強調（ノード hover と同色＝--accent。選択より前に置く） */
.bgp-edge.lk-hover { stroke: var(--accent); stroke-width: 4; opacity: 1; filter: drop-shadow(0 0 6px color-mix(in srgb, var(--accent) 50%, transparent)); }
/* ノード選択による強調は物理リンクと同一規則（eBGP/iBGP とも） */
.bgp-edge.sel-edge { stroke: var(--accent); stroke-width: 3.5; }
.bgp-edge.sel-between { stroke: var(--accent); stroke-width: 5; filter: drop-shadow(0 0 6px color-mix(in srgb, var(--accent) 60%, transparent)); }
.bgp-edge.bgp-hot { stroke: var(--search); stroke-width: 4.5; filter: drop-shadow(0 0 7px color-mix(in srgb, var(--search) 70%, transparent)); }
/* RR-client セッション: 実線・iBGP 青系・やや太め＋矢じり（RR→client 方向）で iBGP peer (破線) と区別。
   色は edge のインライン stroke 属性（BGP_COLOR.ibgp）を活かすため stroke は上書きしない。 */
.bgp-edge.rr { stroke-dasharray: 1 0; stroke-width: 3; stroke-linecap: round; }

g.node { cursor: pointer; }
g.node rect.body {
  fill: var(--node-fill); stroke: var(--node-edge); stroke-width: 1.4;
  transition: stroke .15s, filter .2s;
}
g.node text.hn { fill: var(--node-ink); font-size: 14px; font-weight: bold; letter-spacing: .03em; }
g.node text.sub { fill: var(--ink-dim); font-size: 10px; letter-spacing: .04em; }
g.node .vbar { opacity: .9; }
g.node.selected rect.body { stroke: var(--accent); stroke-width: 2.4; filter: drop-shadow(0 0 8px color-mix(in srgb, var(--accent) 55%, transparent)); }
g.node.search-hit rect.body { stroke: var(--search); stroke-width: 2.2; }
/* hover はノード選択と同じハイライト（選択マーカーの ● だけ出さない） */
g.node.hovered rect.body { stroke: var(--accent); stroke-width: 2.4; filter: drop-shadow(0 0 8px color-mix(in srgb, var(--accent) 55%, transparent)); }
/* BGP ビュー: Route Reflector / RR Client のノード装飾。
   .rrnode = 金/琥珀の太枠リング（RR）、.rrcnode = 中空（破線）リング（client）。
   選択/hover/search-hit（var(--accent)）はこれらより後の詳細度同等規則で上書きされる順序に注意するため、
   ここでは rect.body 直後に置き、selected/hovered/search-hit 規則（上で既出）に負けないよう同詳細度・後勝ちにする。 */
g.node.rrnode rect.body { stroke: var(--rr, #e0a44a); stroke-width: 2.6; }
g.node.rrcnode rect.body { stroke: var(--rr, #e0a44a); stroke-width: 1.8; stroke-dasharray: 5 3; }
/* RR/RRC バッジ（ノード右上の小ラベル） */
g.node .rrbadge { fill: var(--rr, #e0a44a); }
g.node .rrbadge-t { fill: var(--bg); font-size: 8px; font-weight: bold; letter-spacing: .04em; }
/* 選択/hover/search-hit は RR リングより前面の強調として優先（再掲・後勝ちで accent/search を確実に出す）。
   .rrcnode は通常時 stroke-dasharray:5 3（破線）だが、選択/hover/search-hit 時は他ノードと同様に
   実線アクセントへ統一するため stroke-dasharray:none を明示（破線が残って非一貫になるのを防ぐ）。 */
g.node.rrnode.selected rect.body, g.node.rrcnode.selected rect.body,
g.node.rrnode.hovered rect.body, g.node.rrcnode.hovered rect.body { stroke: var(--accent); stroke-width: 2.4; stroke-dasharray: none; filter: drop-shadow(0 0 8px color-mix(in srgb, var(--accent) 55%, transparent)); }
g.node.rrnode.search-hit rect.body, g.node.rrcnode.search-hit rect.body { stroke: var(--search); stroke-width: 2.2; stroke-dasharray: none; }

g.segnode { cursor: pointer; }
g.segnode ellipse { fill: var(--seg-fill); stroke: var(--node-edge); stroke-width: 1.2; stroke-dasharray: 3 3; }
g.segnode text { fill: var(--ink-dim); font-size: 10px; }
/* loopback / stub は色で区別（selected/hovered/search-hit は同詳細度・後勝ちで stroke を上書きするためこの2行より後に置く） */
g.segnode.lpnode ellipse { fill: var(--lp-fill); stroke: var(--lp-edge); }
g.segnode.stubnode ellipse { fill: var(--stub-fill); stroke: var(--stub-edge); }
g.segnode.selected ellipse, g.segnode.hovered ellipse { stroke: var(--accent); stroke-width: 2; }
g.segnode.search-hit ellipse { stroke: var(--search); stroke-width: 2; }

/* STATIC ビュー: スタティック経路の方向線（矢じり）と blackhole/dangling 終端・トレース・ハイライト */
.se-edge { fill: none; stroke: var(--se-edge, #e0a44a); stroke-width: 2; opacity: .9; }
.se-edge.se-default { stroke-dasharray: 7 4; }            /* default 経路は破線 */
.se-edge.se-ecmp { stroke-width: 3; }                     /* ECMP は太線 */
.se-edge.se-blackhole { stroke: var(--danger); }
.se-edge.se-dangling { stroke: #d08a2a; }
.se-edge.se-viaif { stroke: #5b8def; }                    /* IF 名 next-hop（peer 不定） */
.se-edge.trace-edge { stroke: var(--accent); stroke-width: 4; opacity: 1; filter: drop-shadow(0 0 6px color-mix(in srgb, var(--accent) 55%, transparent)); }
g.sstubnode { cursor: default; }
g.sstubnode ellipse { fill: var(--panel); stroke-width: 1.4; stroke-dasharray: 4 3; }
g.sstubnode.se-blackhole ellipse { stroke: var(--danger); }
g.sstubnode.se-dangling ellipse { stroke: #d08a2a; }
g.sstubnode.se-viaif ellipse { stroke: #5b8def; }
g.sstubnode text { font-size: 10px; fill: var(--ink-dim); }
g.node.trace-hop rect.body { stroke: var(--accent); stroke-width: 3; filter: drop-shadow(0 0 8px color-mix(in srgb, var(--accent) 60%, transparent)); }
/* STATIC トレース UI コントロール */
#trace-src, #trace-dst { background: var(--panel); color: var(--ink); border: 1px solid var(--panel-edge);
  border-radius: 5px; padding: 2px 6px; font-size: 11px; }
#trace-src { max-width: 150px; }
#trace-dst { width: 150px; }
#trace-src:focus, #trace-dst:focus { border-color: var(--search); outline: none; }
#trace-verdict { font-size: 11px; font-weight: 600; }
.badge.tv-delivered, #trace-verdict.tv-delivered { color: var(--accent2,#2a7); border-color: var(--accent2,#2a7); }
.badge.tv-blackhole, #trace-verdict.tv-blackhole { color: var(--danger); border-color: var(--danger); }
.badge.tv-loop, #trace-verdict.tv-loop { color: #d08a2a; border-color: #d08a2a; }
.badge.tv-no-route, #trace-verdict.tv-no-route,
.badge.tv-unreachable-nexthop, #trace-verdict.tv-unreachable-nexthop { color: var(--ink-dim); }

/* 外部ピアは機器と同じノード描画（g.node スタイルを共用）。枠だけ点線で区別（凡例と対応） */
g.node.ext rect.body { stroke-dasharray: 6 4; }

.asframe { fill: none; stroke-width: 1.6; rx: 14; opacity: .9; }
.asframe-fill { opacity: .07; }
.aslabel { font-size: 11px; font-weight: bold; letter-spacing: .1em; }

.area-badge rect { rx: 4; opacity: .95; }
.area-badge text { font-size: 10px; font-weight: bold; }
.subnet-tag { font-size: 9px; fill: var(--ink-dim); pointer-events: none; }

/* 提案: 選択/ホバー時にリンク端へ IF 名を表示（IFチップ廃止の代替） */
.iflabel { font-size: 9px; fill: var(--accent); opacity: 0; transition: opacity .18s; pointer-events: none; }
.iflabel.show { opacity: 1; }
.iflabel.ll { fill: var(--ink-faint); }
.iflabel-bg { fill: var(--bg); opacity: 0; rx: 3; pointer-events: none; }
.iflabel-bg.show { opacity: .85; }
.ll-t { color: var(--ink-faint); }

.dim { opacity: .16 !important; transition: opacity .25s; }
.hidden { display: none !important; }

/* ---------- shortcuts overlay ---------- */
#shortcuts-overlay {
  display: none;
  position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,.55);
  align-items: center; justify-content: center;
}
#shortcuts-overlay.visible { display: flex; }
#shortcuts-overlay .sc-box {
  background: var(--panel); border: 1px solid var(--panel-edge);
  border-radius: 12px; padding: 20px 28px; box-shadow: var(--shadow);
  min-width: 300px; max-width: 420px;
}
#shortcuts-overlay .sc-box h3 {
  margin: 0 0 14px; font-size: 13px; letter-spacing: .12em;
  color: var(--ink-dim);
}
#shortcuts-overlay table { border-collapse: collapse; width: 100%; }
#shortcuts-overlay td { padding: 4px 6px; font-size: 12px; color: var(--ink-dim); }
#shortcuts-overlay td:first-child {
  font-weight: bold; color: var(--ink);
  border: 1px solid var(--panel-edge); border-radius: 4px;
  padding: 2px 7px; white-space: nowrap; text-align: center;
  background: var(--bg);
}

/* ---------- tooltip ---------- */
#tooltip {
  position: absolute; pointer-events: none; z-index: 30;
  background: var(--panel); border: 1px solid var(--panel-edge); border-radius: 8px;
  padding: 8px 11px; box-shadow: var(--shadow);
  font-size: 11px; line-height: 1.55; display: none; max-width: 280px;
}
#tooltip .tt-title { color: var(--accent); font-weight: bold; letter-spacing: .06em; }
#tooltip .tt-row { color: var(--ink-dim); }
#tooltip .tt-row b { color: var(--ink); font-weight: normal; }

/* ---------- details panel ---------- */
#details {
  width: 330px; background: var(--panel);
  border-left: 1px solid var(--panel-edge);
  display: flex; flex-direction: column; min-height: 0;
}
#details .dhead {
  padding: 10px 14px; border-bottom: 1px solid var(--panel-edge);
  display: flex; align-items: center; justify-content: space-between;
  letter-spacing: .12em; font-size: 11px; color: var(--ink-dim);
}
#details .dhead .selcount { color: var(--accent); }
#dbody { overflow-y: auto; padding: 12px; flex: 1; }
.card {
  border: 1px solid var(--panel-edge); border-radius: 10px;
  margin-bottom: 12px; overflow: hidden; background: var(--bg);
}
.card .chead {
  padding: 9px 12px; display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap;
  border-bottom: 1px solid var(--panel-edge); background: var(--panel-glow);
}
.card .chead b { font-size: 14px; }
.badge {
  font-size: 9px; padding: 1px 6px; border-radius: 4px; letter-spacing: .06em;
  border: 1px solid var(--panel-edge); color: var(--ink-dim);
}
.badge.as { color: var(--accent); border-color: var(--accent); }
.badge.rid { color: var(--search); border-color: color-mix(in srgb, var(--search) 60%, transparent); }
.badge.ospf-b { color: var(--ink-faint); border-color: var(--panel-edge); font-size: 9px; }
.csec { padding: 8px 12px; }
.csec h4 { font-size: 10px; letter-spacing: .14em; color: var(--ink-faint); margin-bottom: 6px; font-weight: normal; }
table.dt { width: 100%; border-collapse: collapse; font-size: 11px; }
table.dt th { text-align: left; color: var(--ink-faint); font-weight: normal; padding: 2px 6px 4px 0; border-bottom: 1px solid var(--panel-edge); font-size: 10px; }
table.dt td { padding: 4px 6px 4px 0; color: var(--ink); vertical-align: top; border-bottom: 1px dashed color-mix(in srgb, var(--panel-edge) 60%, transparent); }
table.dt td.dim-t { color: var(--ink-dim); }
.st-up { color: var(--search); } .st-down { color: var(--danger); }
tr.bgprow, tr.ospfrow[data-net], tr.ifrow[data-net] { cursor: pointer; }
tr.bgprow:hover td, tr.bgprow.hot td,
tr.ospfrow[data-net]:hover td, tr.ospfrow.hot td,
tr.ifrow[data-net]:hover td, tr.ifrow.hot td { background: color-mix(in srgb, var(--search) 12%, transparent); }
.linkpair[data-net] { cursor: pointer; }
.linkpair.hot { border-color: var(--search); background: color-mix(in srgb, var(--search) 10%, transparent); }
.linkpair {
  border: 1px dashed var(--panel-edge); border-radius: 8px; padding: 8px 10px; margin-bottom: 8px;
  font-size: 11px; line-height: 1.6;
}
.linkpair .subnet { color: var(--accent); }
.linkpair .ifn { color: var(--ink); }
.linkpair .ipd { color: var(--ink-dim); }
.placeholder { color: var(--ink-faint); font-size: 11px; line-height: 1.9; padding: 8px 4px; }
.placeholder b { color: var(--ink-dim); font-weight: normal; }

/* ---------- AS filter dropdown ---------- */
.as-filter-wrap { position: relative; display: inline-flex; }
#as-menu {
  display:none; position: absolute; z-index: 40;
  background: var(--panel); border: 1px solid var(--panel-edge);
  border-radius: 8px; box-shadow: var(--shadow);
  padding: 8px 10px; min-width: 160px;
  max-height: 280px; overflow: auto;
  top: calc(100% + 4px); left: 0;
}
#as-menu.open { display: block; }
#as-menu .as-menu-actions { display: flex; gap: 6px; margin-bottom: 6px; }
#as-menu .as-menu-actions button { flex: 1; font-size: 10px; padding: 2px 6px; }
#as-menu label.tchk { display: flex; align-items: center; }

/* ---------- legend & minimap ---------- */
#legend {
  position: absolute; left: 14px; bottom: 38px; z-index: 20;
  background: color-mix(in srgb, var(--panel) 92%, transparent);
  border: 1px solid var(--panel-edge); border-radius: 10px;
  padding: 10px 14px; font-size: 10px; line-height: 2;
  box-shadow: var(--shadow); min-width: 150px;
}
#legend h4 { font-size: 9px; letter-spacing: .18em; color: var(--ink-faint); font-weight: normal; margin-bottom: 2px; }
#legend .li { display: flex; align-items: center; gap: 8px; color: var(--ink-dim); }
#legend .li.clk { cursor: pointer; }
#legend .li.clk:hover { color: var(--ink); }
#legend .li.on { color: var(--accent); }
#legend .note { color: var(--ink-faint); font-size: 9px; line-height: 1.5; margin-top: 4px; }
#legend .sw { width: 22px; height: 0; border-top: 2px solid var(--link); }
#legend .sw.dash { border-top-style: dashed; }
#legend .sw.box { height: 10px; border: 1.4px solid var(--node-edge); background: var(--node-fill); border-radius: 2px; }
#legend .sw.seg { height: 10px; border: 1.2px dashed var(--node-edge); border-radius: 50%; background: var(--seg-fill); }
#legend .sw.lp { height: 10px; border: 1.2px dashed var(--lp-edge); border-radius: 50%; background: var(--lp-fill); }
#legend .sw.stub2 { height: 10px; border: 1.2px dashed var(--stub-edge); border-radius: 50%; background: var(--stub-fill); }
/* BGP RR/RRC 凡例スウォッチ: ノード装飾（金枠リング・中空破線リング）と矢印 */
#legend .sw.rr { height: 10px; border: 2px solid var(--rr); border-radius: 2px; background: var(--node-fill); }
#legend .sw.rrc { height: 10px; border: 1.6px dashed var(--rr); border-radius: 2px; background: var(--node-fill); }
#legend .sw.rrarrow { border-top: 2px solid var(--rr); position: relative; }
#legend .sw.rrarrow::after { content: "B8"; position: absolute; right: -4px; top: -8px; color: var(--rr); font-size: 11px; }
#minimap {
  position: absolute; right: 14px; bottom: 38px; z-index: 20;
  width: 180px; height: 120px;
  background: color-mix(in srgb, var(--panel) 94%, transparent);
  border: 1px solid var(--panel-edge); border-radius: 10px;
  box-shadow: var(--shadow); overflow: hidden;
}
#minimap svg { width: 100%; height: 100%; display: block; }
#minimap .mdot { fill: var(--ink-dim); }
#minimap .mview { fill: none; stroke: var(--accent); stroke-width: 1.5; }

/* ---------- status bar (提案: 実行サマリーの常時表示) ---------- */
#statusbar {
  height: 26px; background: var(--panel); border-top: 1px solid var(--panel-edge);
  display: flex; align-items: center; gap: 18px; padding: 0 14px;
  font-size: 10px; color: var(--ink-dim); letter-spacing: .06em;
}
#statusbar .warn { color: var(--accent); }
#statusbar .src { margin-left: auto; color: var(--ink-faint); }

/* BGP ビューのアドレス・ソースIF ラベルは .iflabel（他ビューの IF ラベル）と同一スタイルを共用 */
g.segnode.bgp-hot ellipse { stroke: var(--search); stroke-width: 2.4; filter: drop-shadow(0 0 7px color-mix(in srgb, var(--search) 60%, transparent)); }

/* ---------- stub / loopback ノード ---------- */
/* stub / loopback は segment 様式（.segnode 楕円 + .lk スポーク + .area-badge）を再利用し、
   data-elem="seg"・data-id=dev:ifn で segment と同じ hittest/選択/可視性/詳細パネル/凡例 dim に乗る。
   色のみ kind で区別（.lpnode=loopback / .stubnode=stub。上の g.segnode.lpnode/.stubnode ルール参照）。
   描画・ハイライト・IF/IP ラベルは _JS 側 render() の stub ノードブロック（segment ロジックと共通）。*/

/* 詳細パネル: リサイズハンドルと最小化 */
#resizer { width: 6px; flex: none; cursor: col-resize; background: transparent; border-left: 1px solid var(--panel-edge); }
#resizer:hover { background: color-mix(in srgb, var(--accent) 35%, transparent); }
#details.min { width: 36px !important; min-width: 36px; }
#details.min #dbody, #details.min .dhead span:not(.pbtns) { display: none; }
.dhead .pbtns { display: flex; gap: 4px; margin-left: auto; }
.dhead .pbtns button {
  background: none; border: 1px solid var(--panel-edge); border-radius: 4px;
  color: var(--ink-dim); cursor: pointer; width: 22px; height: 18px;
  line-height: 1; font-size: 10px; padding: 0;
}
.dhead .pbtns button:hover { color: var(--ink); border-color: var(--ink-faint); }

/* ---------- 表ビュー（ADDRESSES / INTERFACES） ---------- */
#tableview {
  position: absolute; inset: 0; z-index: 22; display: none;
  background: var(--bg); overflow-y: auto; padding: 18px 24px 48px;
}
#tableview .thead { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; max-width: 1080px; }
#tableview .thead h3 { font-size: 13px; letter-spacing: .16em; color: var(--ink-dim); font-weight: normal; }
#tableview .thead .cnt { color: var(--accent); font-size: 11px; }
#tableview .thead .tbtn { padding: 3px 9px; font-size: 11px; }
#tableview .thead .sp { flex: 1; }
#tableview table.dt { font-size: 12px; max-width: 1080px; }
#tableview table.dt th { position: sticky; top: 0; background: var(--bg); padding: 6px 14px 6px 0; }
#tableview table.dt th.sortable { cursor: pointer; user-select: none; }
#tableview table.dt th.sortable:hover { color: var(--ink); }
#tableview table.dt td { padding: 5px 14px 5px 0; }
#tableview tr.trow:hover td { background: color-mix(in srgb, var(--ink-dim) 9%, transparent); }
/* サブネットグループ見出し行（クリックで折りたたみ） */
#tableview tr.grph td {
  background: var(--panel); color: var(--ink); cursor: pointer; user-select: none;
  letter-spacing: .05em; padding: 7px 14px 7px 6px;
  border-top: 1px solid var(--panel-edge); border-bottom: 1px solid var(--panel-edge);
}
#tableview tr.grph:hover td { background: color-mix(in srgb, var(--panel) 78%, var(--ink-faint)); }
#tableview tr.grph .usage { color: var(--accent); margin-left: 12px; font-size: 11px; }
#tableview tr.grph .cards { color: var(--ink-dim); margin-left: 10px; font-size: 10px; }
#tableview .chk-bad { color: var(--danger); }
#tableview .no-desc { color: var(--accent); opacity: .75; }
#tableview .tnote { color: var(--ink-faint); font-size: 10px; margin-top: 10px; line-height: 1.8; }
/* IF 種別バッジ */
#tableview .ifk { font-size: 9px; padding: 0 5px; border-radius: 4px; border: 1px solid var(--panel-edge); margin-left: 6px; letter-spacing: .04em; }
#tableview .ifk-conn   { color: var(--search); border-color: color-mix(in srgb, var(--search) 55%, transparent); }
#tableview .ifk-stub   { color: var(--ink-dim); }
#tableview .ifk-unused { color: var(--accent); border-color: var(--accent); }
#tableview .ifk-loop   { color: var(--ink-faint); }
#tableview .ifk-rsv    { color: #b794f6; border-color: color-mix(in srgb, #b794f6 55%, transparent); }   /* 予約 */
#tableview .ifk-dis    { color: var(--danger); border-color: color-mix(in srgb, var(--danger) 55%, transparent); }  /* 使用不可 */
/* 状態指定ボタン（クリックで − → 予約 → 不可 → − を循環） */
#tableview button.portset {
  background: var(--bg); border: 1px solid var(--panel-edge); border-radius: 5px;
  padding: 1px 8px; font-size: 11px; cursor: pointer; color: var(--ink-dim); min-width: 40px;
}
#tableview button.portset:hover { color: var(--ink); border-color: var(--ink-faint); }
#tableview button.portset.set-reserved { color: #b794f6; border-color: color-mix(in srgb, #b794f6 55%, transparent); }
#tableview button.portset.set-disabled { color: var(--danger); border-color: color-mix(in srgb, var(--danger) 55%, transparent); }
/* 備考メモ入力（クリックで編集・blur で永続保存） */
#tableview input.noteinput {
  width: 100%; min-width: 120px; background: transparent; color: var(--ink);
  border: 1px solid transparent; border-radius: 5px; padding: 2px 6px; font-size: 11px; outline: none;
}
#tableview input.noteinput::placeholder { color: var(--ink-faint); }
#tableview input.noteinput:hover { border-color: var(--panel-edge); }
#tableview input.noteinput:focus { border-color: var(--search); background: var(--bg); }
/* グループ見出しの複数行レイアウト */
#tableview tr.grph .ghtop { font-size: 12px; }
#tableview tr.grph .cards2 { color: var(--ink-dim); font-size: 11px; line-height: 1.7; margin-top: 3px; white-space: pre; font-variant-numeric: tabular-nums; }
/* ポート状態カテゴリの色（機器サマリ・カード内訳・tnote 凡例で共通） */
#tableview .c-used { color: var(--search); }
#tableview .c-rsv  { color: #b794f6; }
#tableview .c-dis  { color: var(--danger); }
#tableview .c-free { color: var(--accent); }
/* Connected to セル（リンクは対向行へジャンプ可能） */
#tableview td.peer-jump { color: var(--search); cursor: pointer; }
#tableview td.peer-jump:hover { text-decoration: underline; }
/* 対向行ジャンプ時の一時ハイライト */
@keyframes rowflash {
  0% { background: color-mix(in srgb, var(--accent) 55%, transparent); }
  100% { background: transparent; }
}
#tableview tr.row-flash td { animation: rowflash 1.3s ease-out; }

/* ---------- CONFIG ビュー（生 running-config 閲覧） ---------- */
#tableview .cfgwarn {
  max-width: 1080px; margin: 0 0 12px; padding: 7px 12px;
  font-size: 11px; line-height: 1.6; color: var(--accent);
  border: 1px solid color-mix(in srgb, var(--accent) 45%, transparent);
  border-radius: 7px; background: color-mix(in srgb, var(--accent) 8%, transparent);
}
#tableview .cfgwrap { display: flex; gap: 14px; max-width: 1080px; align-items: flex-start; }
#tableview .cfglist {
  flex: 0 0 200px; max-height: 70vh; overflow-y: auto;
  border: 1px solid var(--panel-edge); border-radius: 8px; padding: 4px;
}
#tableview .cfgdev {
  display: flex; justify-content: space-between; align-items: baseline; gap: 8px;
  padding: 6px 9px; border-radius: 6px; cursor: pointer; font-size: 12px;
}
#tableview .cfgdev:hover { background: color-mix(in srgb, var(--ink-dim) 9%, transparent); }
#tableview .cfgdev.active { background: color-mix(in srgb, var(--search) 18%, transparent); color: var(--ink); }
#tableview .cfgdev-h { font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
#tableview .cfgdev-c { color: var(--ink-faint); font-size: 10px; flex: 0 0 auto; }
#tableview .cfgbody { flex: 1 1 auto; min-width: 0; }
#tableview .cfgbody-h { font-size: 12px; color: var(--ink-dim); margin-bottom: 6px; letter-spacing: .04em; }
#tableview .cfgpre {
  max-height: 70vh; overflow: auto;
  border: 1px solid var(--panel-edge); border-radius: 8px;
  background: var(--bg); padding: 8px 0;
  font-family: ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; font-size: 12px;
}
#tableview .cfgline { display: flex; white-space: pre; line-height: 1.55; min-width: max-content; position: relative; }
#tableview .cfgline:hover { background: color-mix(in srgb, var(--ink-dim) 7%, transparent); }
#tableview .cfgline.hit { background: color-mix(in srgb, var(--search) 22%, transparent); }
#tableview .cfgline.cur { background: color-mix(in srgb, var(--search) 42%, transparent); outline: 1px solid var(--search); }
/* 行折返し: pre-wrap にして横スクロールを止め、行内で折り返す */
#tableview .cfgpre.wrap .cfgline { white-space: pre-wrap; min-width: 0; }
#tableview .cfgpre.wrap .cfgtx { overflow-wrap: anywhere; }
/* CONFIG ツールバー */
#tableview .cfgtools {
  display: flex; align-items: center; gap: 8px; max-width: 1080px;
  margin: 0 0 10px; font-size: 11px;
}
#tableview .cfgtools .sp { flex: 1; }
#tableview .cfgtools .tbtn.on { color: var(--search); border-color: color-mix(in srgb, var(--search) 55%, transparent); }
#tableview .cfgnav { display: inline-flex; align-items: center; gap: 6px; color: var(--ink-dim); }
#tableview .cfgnav .tbtn { padding: 1px 7px; }
#tableview .cfgnav #cfgnavpos { min-width: 34px; text-align: center; font-variant-numeric: tabular-nums; }
/* parse 状態モード: 行の左境界色で 3 状態を区別（unparsed=警告色で目立たせる） */
#tableview .cfgline.ps-parsed   { box-shadow: inset 3px 0 0 color-mix(in srgb, var(--accent2,#2a7) 80%, transparent); }
#tableview .cfgline.ps-ignored  { box-shadow: inset 3px 0 0 var(--ink-faint); }
#tableview .cfgline.ps-unparsed { box-shadow: inset 3px 0 0 var(--danger); background: color-mix(in srgb, var(--danger) 12%, transparent); }
#tableview .cfgline.ps-unparsed .cfgln { color: var(--danger); }
#tableview .cfglegend { display: inline-flex; gap: 10px; align-items: center; color: var(--ink-dim); font-size: 10px; }
#tableview .cfglegend .ps-parsed   { color: var(--accent2,#2a7); }
#tableview .cfglegend .ps-ignored  { color: var(--ink-faint); }
#tableview .cfglegend .ps-unparsed { color: var(--danger); }
/* 2ペイン比較・編集ワークベンチ */
#tableview .cfgdiffsum { color: var(--ink-dim); font-variant-numeric: tabular-nums; }
#tableview .cfgsplit { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; max-width: 1080px; }
#tableview .cfgpane { min-width: 0; display: flex; flex-direction: column; }
#tableview .cfgpane-h { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; font-size: 11px; }
#tableview select.cfgsrc {
  background: var(--panel); color: var(--ink); border: 1px solid var(--panel-edge);
  border-radius: 5px; padding: 2px 6px; font-size: 11px; max-width: 180px;
}
#tableview .cfgsrc-fixed { font-weight: 600; }
#tableview .cfgedited { color: var(--accent); font-size: 10px; }
#tableview textarea.cfgedit {
  width: 100%; min-height: 60vh; max-height: 70vh; resize: vertical; box-sizing: border-box;
  background: var(--bg); color: var(--ink); border: 1px solid var(--panel-edge); border-radius: 8px;
  padding: 8px 10px; font-family: ui-monospace, Menlo, Consolas, monospace; font-size: 12px; line-height: 1.55;
  /* 行整列のため折返さず横スクロール（左ペインの 1 論理行 = textarea の 1 行に対応させる） */
  white-space: pre; overflow-x: auto;
}
#tableview textarea.cfgedit:focus { border-color: var(--search); outline: none; }
/* 文字置換（リテラル全置換）行 */
#tableview .cfgreplace { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
#tableview .cfgreplace input { flex: 1 1 0; min-width: 0; background: var(--bg); color: var(--ink);
  border: 1px solid var(--panel-edge); border-radius: 5px; padding: 3px 7px; font-size: 11px; }
#tableview .cfgreplace input:focus { border-color: var(--search); outline: none; }
#tableview .cfgreplmsg { color: var(--accent); font-size: 10px; flex: 0 0 auto; }
/* 行差分（左=削除/赤系・右=追加/緑系）。parse 状態色とは別レイヤー */
#tableview .cfgline.diff-del { background: color-mix(in srgb, var(--danger) 16%, transparent); box-shadow: inset 3px 0 0 var(--danger); }
#tableview .cfgline.diff-add { background: color-mix(in srgb, var(--accent2,#2a7) 16%, transparent); box-shadow: inset 3px 0 0 var(--accent2,#2a7); }
/* 行整列の空行ギャップ（片側だけにある行に対応する反対側の空きスロット） */
#tableview .cfgline.gap { background: color-mix(in srgb, var(--ink-dim) 5%, transparent); }
#tableview .cfgln {
  flex: 0 0 48px; text-align: right; padding: 0 12px 0 0; margin-right: 12px;
  color: var(--ink-faint); user-select: none;
  border-right: 1px solid var(--panel-edge);
}
#tableview .cfgtx { flex: 1 1 auto; padding-right: 14px; }
/* CONFIG 編集モード: 左=行番号ガター＋textarea / 右=統一差分プレビュー */
#tableview .cfgedit-wrap { position: relative; display: flex; flex: 1; min-height: 0; }
#tableview .cfgedit-gut {
  flex: 0 0 44px; overflow: hidden; text-align: right; padding-right: 6px;
  color: var(--ink-faint); background: color-mix(in srgb, var(--bg) 60%, var(--panel));
  user-select: none; font-size: 12px; line-height: 1.55;
  font-family: ui-monospace, Menlo, Consolas, monospace;
  border-right: 1px solid var(--panel-edge);
}
#tableview .cfgedit-gut .n { height: 1.55em; line-height: 1.55em; display: block; }
#tableview .cfgedit-gut .n.cur { color: var(--search); }
/* 統一差分プレビュー列 */
#tableview .cfgunified { flex: 1; overflow: auto; }
#tableview .urow { display: flex; white-space: pre; line-height: 1.55; font-size: 12px;
  font-family: ui-monospace, Menlo, Consolas, monospace; }
#tableview .urow .ug { flex: 0 0 40px; text-align: right; padding-right: 6px; color: var(--ink-faint); user-select: none; }
#tableview .urow .us { flex: 0 0 14px; text-align: center; user-select: none; }
#tableview .urow .utx { flex: 1; padding-right: 6px; }
#tableview .urow.ctx .utx { color: var(--ink-dim); }
#tableview .urow.del { background: color-mix(in srgb, var(--danger) 14%, transparent); }
#tableview .urow.del .us { color: var(--danger); }
#tableview .urow.add { background: color-mix(in srgb, var(--accent2,#2a7) 14%, transparent); }
#tableview .urow.add .us { color: var(--accent2,#2a7); }
#tableview .urow.cur { box-shadow: inset 3px 0 0 var(--search); }
#tableview .urow.hit { outline: 1px solid color-mix(in srgb, var(--search) 50%, transparent); }
/* dirty バッジ: 機器リストの編集済みマーカー */
#tableview .cfgdirty { color: var(--accent); margin-left: 4px; }

/* ---------- 表示ノード指定パネル ---------- */
#nodepanel {
  position: absolute; top: 12px; right: 14px; z-index: 25;
  background: color-mix(in srgb, var(--panel) 94%, transparent);
  border: 1px solid var(--panel-edge); border-radius: 10px;
  padding: 10px 14px; font-size: 11px; line-height: 2;
  box-shadow: var(--shadow); display: none; min-width: 170px;
  max-height: calc(100vh - 160px); overflow-y: auto;
}
#nodepanel h4 { font-size: 9px; letter-spacing: .18em; color: var(--ink-faint); font-weight: normal; margin-bottom: 4px; }
#nodepanel label { display: flex; align-items: center; gap: 7px; cursor: pointer; color: var(--ink-dim); }
#nodepanel label:hover { color: var(--ink); }
#nodepanel input { accent-color: var(--accent); }
#nodepanel .ntype { color: var(--ink-faint); font-size: 9px; margin-left: auto; }


</style></head><body>

<header>
  <div class="brand"><b>CONFIG-TOPOLOGY</b><span>v2.0 design sample</span></div>
  <nav class="tabs" id="tabs"><button data-view="physical">PHYSICAL<span class="k">1</span></button><button data-view="ospf">OSPF<span class="k">2</span></button><button data-view="addr">ADDRESSES<span class="k">3</span></button><button data-view="ifs">INTERFACES<span class="k">4</span></button><button data-view="config">CONFIG<span class="k">5</span></button><button data-view="checks">CHECKS<span class="k">6</span></button></nav>
  <div class="toolbar">
    <select id="sfield" class="sfield" title="検索対象フィールドを選択（ALL = hostname・IP・description・AS・vendor・IF名を横断）。host: 等の記法を書かずに絞り込めます">
      <option value="all">ALL</option>
      <option value="host">host</option>
      <option value="ip">ip</option>
      <option value="desc">desc</option>
      <option value="as">as</option>
      <option value="vendor">vendor</option>
      <option value="net">net</option>
    </select>
    <div class="searchbox">
      <input id="search" type="text" placeholder="検索: 文字列 / host: ip: desc: as: vendor: net:"
        title="/ または Ctrl+F = 検索欄へフォーカス&#10;左のドロップダウンで対象フィールドを選択（host: 等を書かなくてよい）&#10;自由文字列 = hostname・IP(v4/v6)・description・AS番号・vendor・IF名を横断検索&#10;host:r1 = hostname のみ&#10;ip:10.0.0. = IPアドレスのみ&#10;desc:uplink = description のみ&#10;as:65001 = AS番号のみ&#10;vendor:junos = ベンダーのみ&#10;net:10.0.0 = サブネットのみ（テキスト記法はドロップダウンより優先）&#10;Enter = 次のヒットへ移動">
      <span class="count" id="searchcount"></span>
    </div>
    <div class="tgroup gonly">
      <button class="tbtn" id="zin" title="zoom in">＋</button>
      <button class="tbtn" id="zout" title="zoom out">－</button>
      <button class="tbtn" id="zfit" title="fit (F)">FIT</button>
      <button class="tbtn" id="zreset" title="reset (Esc)">1:1</button>
    </div>
    <span class="tsep gonly"></span>
    <label class="tchk gonly"><input type="checkbox" id="f-seg" checked>セグメント</label>
    <label class="tchk gonly"><input type="checkbox" id="f-lo" checked>loopback</label>
    <label class="tchk gonly"><input type="checkbox" id="f-stub" checked>スタブ</label>
    <div class="as-filter-wrap gonly">
      <button class="tbtn gonly" id="as-menu-btn" title="AS 単位の表示フィルタ">AS ▾</button>
      <div id="as-menu">
        <div class="as-menu-actions">
          <button class="tbtn" id="as-show-all">全表示</button>
          <button class="tbtn" id="as-hide-all">全非表示</button>
        </div>
        <div id="as-menu-list"></div>
      </div>
    </div>
    <span class="tsep gonly"></span>
    <button class="tbtn gonly" id="btn-nodes" title="表示するノードを個別に指定">表示ノード</button>
    <button class="tbtn gonly" id="btn-connected" title="選択ノードの接続先のみ表示">接続先のみ</button>
    <button class="tbtn gonly" id="btn-focus" title="選択ノードの N-hop 隣接以外を淡色化（フォーカス）">フォーカス</button>
    <span class="tsep gonly"></span>
    <button class="tbtn gonly" id="btn-minimap">MAP</button>
    <button class="tbtn gonly" id="btn-legend">凡例</button>
    <span class="tsep gonly"></span>
    <div class="tgroup static-only" title="スタティック経路トレース（始点機器から宛先への転送経路をシミュレート）">
      <select id="trace-src" title="トレース始点機器"></select>
      <input id="trace-dst" list="trace-dsts" placeholder="宛先 IP / prefix" title="宛先 IP または prefix" spellcheck="false">
      <datalist id="trace-dsts"></datalist>

/* presentAreas(data): data.links (非 admin_down かつ area あり) と data.segments (area あり) から
   area 値を収集する。複合 area (例 "0/1") は "/" で分割して個別値として扱う。
   重複排除後、数値昇順でソートした配列を返す。DOM/グローバルに触れない純関数。
   凡例用は描画される links/segments の area から集計。 */
function presentAreas(data) {
  const seen = new Set();
  const collect = a => {
    if (a == null) return;
    for (const part of String(a).split("/")) {
      const n = /^\d+$/.test(part.trim()) ? +part.trim() : null;
      if (n !== null) seen.add(n);
    }
  };
  for (const l of data.links) if (!l.admin_down && l.area != null) collect(l.area);
  for (const s of data.segments) if (s.area != null) collect(s.area);
  return [...seen].sort((a, b) => a - b);
}
/* presentASes(data): Object.values(data.devices) の as (非 null) と
   data.extPeers の as (非 null) を収集。重複排除後、数値昇順でソートした配列を返す。 */
function presentASes(data) {
  const seen = new Set();
  for (const d of Object.values(data.devices)) if (d.as != null) seen.add(+d.as);
  for (const e of data.extPeers) if (e.as != null) seen.add(+e.as);
  return [...seen].sort((a, b) => a - b);
}

/* dual-stack リンクの v4 ⇄ v6 subnet 対応表。ライン選択は両者を同一ラインとして扱う */

/* その subnet が現在のライン選択（hotNet）と同一ラインか（v4/v6 の対も一致とみなす） */

/* 検索のフィールド演算子（グラフ・表 共通） */
const OP_RE = /^(host|ip|desc|as|vendor|net):(.*)$/;

const u32ToIp = u => [(u>>>24)&255, (u>>>16)&255, (u>>>8)&255, u&255].join(".");
const ipToU32 = h => { const o = h.split(".").map(Number); return ((o[0]<<24)|(o[1]<<16)|(o[2]<<8)|o[3])>>>0; };
/* interface の全 v6 アドレスを返す。GUA を先、link-local を後に concat（sort 非依存で決定的）。
   各要素は {cidr: string, ll: bool}。addrs が無い場合は空配列。 */
function ifV6List(i) {
  const gua = [], ll = [];
  for (const a of (i.addrs||[])) {
    if (a.af !== "v6") continue;
    const cidr = a.prefix != null ? `${a.ip}/${a.prefix}` : a.ip;
    if (!cidr) continue;
    (a.scope === "link-local" ? ll : gua).push(cidr);
  }
  return [...gua.map(c=>({cidr:c, ll:false})), ...ll.map(c=>({cidr:c, ll:true}))];
}

/* v4 アドレスの所属ネットワーク: 結線推論（IP2NET）優先、無ければ自身の prefix から導出
   （対外スタブ /30 等も管理対象に載せる。/32 は host route なので導出せず推論外グループへ） */
function netOfV4(a) {
  const host = a.split("/")[0], p = +a.split("/")[1];
  if (IP2NET[host]) return IP2NET[host];
  if (!(p >= 0 && p < 32)) return null;
  const mask = p === 0 ? 0 : (~0 << (32 - p)) >>> 0;
  return `${u32ToIp((ipToU32(host) & mask) >>> 0)}/${p}`;
}

/* ===== STATIC フォワーディング・トレース（DOM 非依存・純関数）=====
   FIB（DATA.fib）に対する longest-prefix match と hop 連鎖。将来 dynamic も同 FIB 形で再利用。 */
/* v6 アドレス→BigInt（"::" 圧縮対応・ゾーン除去。埋め込み v4 表記は非対応＝正規化済み RFC5952 前提）。 */
function ip6ToBig(s) {
  s = String(s).split("%")[0];
  let head, tail;
  if (s.indexOf("::") >= 0) {
    const parts = s.split("::");
    head = parts[0] ? parts[0].split(":") : [];
    tail = parts[1] ? parts[1].split(":") : [];
  } else { head = s.split(":"); tail = []; }
  const missing = 8 - head.length - tail.length;
  if (missing < 0) return null;
  const groups = head.concat(Array(missing).fill("0"), tail);
  let v = 0n;
  for (const g of groups) v = (v << 16n) | BigInt(parseInt(g || "0", 16) || 0);
  return v;
}
/* ip が cidr に属するか（v4/v6 両対応・self-contained）。cidr は "net/plen"。 */
function ipInCidr(ip, cidr) {
  const slash = cidr.lastIndexOf("/");
  const netAddr = slash >= 0 ? cidr.slice(0, slash) : cidr;
  const isV6 = ip.indexOf(":") >= 0 || netAddr.indexOf(":") >= 0;
  const max = isV6 ? 128 : 32;
  let plen = slash >= 0 ? +cidr.slice(slash + 1) : max;
  if (!(plen >= 0)) plen = 0;                 /* NaN/負は 0（不正入力ガード） */
  if (plen > max) plen = max;                 /* 範囲外（例 /999）はホスト長に丸め負シフトを防ぐ */
  if (isV6) {
    const a = ip6ToBig(ip), n = ip6ToBig(netAddr);
    if (a == null || n == null) return false;
    if (plen <= 0) return true;
    const sh = BigInt(128 - plen);
    return (a >> sh) === (n >> sh);
  }
  const toU = h => { const o = h.split("."); return (((+o[0]) << 24) | ((+o[1]) << 16) | ((+o[2]) << 8) | (+o[3])) >>> 0; };
  const a = toU(ip), n = toU(netAddr);
  if (plen <= 0) return true;
  const mask = (~0 << (32 - plen)) >>> 0;
  return ((a & mask) >>> 0) === ((n & mask) >>> 0);
}
function afOf(ip) { return String(ip).indexOf(":") >= 0 ? "v6" : "v4"; }
/* dev の FIB で dst（IP or prefix の代表ネットワークアドレス）に longest-prefix match するエントリを返す。
   FIB は plen 降順→同 plen は connected が static より先（kind 昇順）でソート済みのため、最初の包含一致が LPM。 */
function evalNode(fib, dev, dstStr, af) {
  const dstIp = String(dstStr).split("/")[0];
  const entries = (fib[dev] || []);
  for (const e of entries) {
    if (e.af !== af) continue;
    if (ipInCidr(dstIp, e.net)) return e;
  }
  return null;
}
/* startDev から dst への転送経路を FIB トレース。verdict: delivered/blackhole/unreachable-nexthop/no-route/loop。 */
function traceForward(fib, startDev, dstStr) {
  const af = afOf(String(dstStr).split("/")[0]);
  const hops = [], visited = new Set();
  let dev = startDev, verdict = "no-route", ecmpBranches = [];
  const cap = Object.keys(fib).length + 1;
  for (let i = 0; i < cap; i++) {
    if (visited.has(dev)) { verdict = "loop"; break; }
    visited.add(dev);
    const m = evalNode(fib, dev, dstStr, af);
    if (!m) { hops.push({ dev, matched: null, next: null }); verdict = "no-route"; break; }
    if (m.ecmpGroup) ecmpBranches = (fib[dev] || []).filter(
      e => e.kind === "static" && e.af === af && e.ecmpGroup === m.ecmpGroup)
      .map(e => ({ prefix: e.prefix, nh: e.nh, target: e.target }));
    if (m.kind === "connected") { hops.push({ dev, matched: m, next: null }); verdict = "delivered"; break; }
    if (m.via === "blackhole") { hops.push({ dev, matched: m, next: null }); verdict = "blackhole"; break; }
    if (m.via === "dangling" || !m.target) { hops.push({ dev, matched: m, next: null }); verdict = "unreachable-nexthop"; break; }
    hops.push({ dev, matched: m, next: m.target });
    dev = m.target;
  }
  return { hops, verdict, visited: [...visited], ecmpBranches };
}
const TRACE_VERDICT = { delivered: "到達", blackhole: "破棄 (blackhole)",
  "unreachable-nexthop": "next-hop 到達不可", "no-route": "経路なし", loop: "ループ" };
/* verdict を class suffix に使う前の許可リスト検証（class 属性インジェクション防御・既知5値のみ） */
function safeVerdict(v) { return TRACE_VERDICT[v] ? v : "no-route"; }

/* 詳細パネル用: トレース結果の hop 列＋verdict（全テキスト esc） */
