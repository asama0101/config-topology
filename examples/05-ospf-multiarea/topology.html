/* ================= CHECKS view (D2 設計検証パネル) ================= */
function renderChecksView() {
  const checks = DATA.checks;
  if (!checks || checks.length === 0) {
    return '<div class="thead"><h3>CHECKS</h3><span class="cnt">0 件</span></div>'
      + '<div class="tnote" style="padding:18px 24px">問題は検出されませんでした。</div>';
  }
  const sevBadge = sev => {
    if (sev === "error")   return `<span class="badge" style="color:var(--danger);border-color:var(--danger)">${esc(sev)}</span>`;
    if (sev === "warning") return `<span class="badge" style="color:var(--accent);border-color:var(--accent)">${esc(sev)}</span>`;
    return `<span class="badge">${esc(sev)}</span>`;
  };
  const errors   = checks.filter(c => c.severity === "error").length;
  const warnings = checks.filter(c => c.severity === "warning").length;
  const summary  = [errors ? `${errors} error` : "", warnings ? `${warnings} warning` : ""].filter(Boolean).join(", ");
  let html = `<div class="thead"><h3>CHECKS</h3><span class="cnt">${esc(summary)}</span></div>`;
  html += `<table class="dt" style="max-width:1080px;margin:0 24px 48px"><tr>
    <th style="width:80px">Severity</th>
    <th style="width:160px">Kind</th>
    <th>Message</th>
    <th>Refs</th></tr>`;
  for (const c of checks) {
    html += `<tr class="trow">
      <td>${sevBadge(c.severity)}</td>
      <td class="dim-t" style="font-size:11px">${esc(c.kind)}</td>
      <td>${esc(c.message)}</td>
      <td class="dim-t" style="font-size:10px">${(c.refs||[]).map(r=>esc(r)).join("<br>")}</td></tr>`;
  }
  html += "</table>";
  return html;
}

/* ================= CONFIG view (生 running-config 閲覧・検索) =================
   左ペイン=機器リスト（グローバル検索でフィルタ）/ 右ペイン=選択機器の生 config を行番号付きで表示。
   検索 S.search は機器名/id/config 本文を横断し、一致機器を残し・一致行をハイライトする。
   図との連動はしない（閲覧・検索専用）。原本そのまま表示のため機密が含まれ得る旨を警告する。 */

/* ---- CONFIG ワークベンチ Phase B: 編集スクラッチ・source・行差分 ---- */
const CFGSCRATCH_KEY = "ct-cfgscratch";
(function initCfgScratch() {
  try {
    const parsed = JSON.parse(localStorage.getItem(CFGSCRATCH_KEY) || "{}");
    /* scratch:<id> キー・文字列値のみ採用（prototype 汚染・不正値の防御） */
    for (const k of Object.keys(parsed)) {
      if (k.startsWith("scratch:") && typeof parsed[k] === "string") S.configScratch[k] = parsed[k];
    }
  } catch (e) { /* localStorage 不可・不正 JSON はセッション内のみ */ }
})();
function saveCfgScratch() {
  try { localStorage.setItem(CFGSCRATCH_KEY, JSON.stringify(S.configScratch)); } catch (e) { /* 永続化不可は無視 */ }
}
/* source key（"dev:<id>" / "prev:<id>"）→ 原本テキスト。
   scratch:* は cfgTextOf 経由でのみ扱う（直接渡すと dev 扱いに誤落下するため呼び出し不可）。 */
function cfgRawOf(key) {
  const idx = key.indexOf(":");
  const kind = key.slice(0, idx), id = key.slice(idx + 1);
  if (kind === "prev") return (DATA.raw_configs_prev || {})[id] || "";
  return (DATA.raw_configs || {})[id] || "";
}
/* 表示テキスト。scratch:* のみ編集バッファ（S.configScratch）を読む。
   dev:/prev: は常に原本（cfgRawOf）→ 編集しても原本は保持され、原本 vs 編集の比較が成立する。 */
function cfgTextOf(key) {
  if (key.startsWith("scratch:")) return S.configScratch[key] != null ? S.configScratch[key] : cfgRawOf("dev:" + key.slice(8));
  return cfgRawOf(key);
}
/* 編集有り判定: scratch が原本と異なる場合 true。末尾改行の差は無視する。 */
function cfgIsDirty(cur) {
  if (cur == null) return false;
  const sk = "scratch:" + cur;
  const s = S.configScratch[sk];
  if (s == null) return false;
  return s.replace(/\n$/, "") !== cfgRawOf("dev:" + cur).replace(/\n$/, "");
}
/* ペインの source key を解決: 自由比較は select.cfgsrc・編集モードは select 不在のため
   textarea/ペインの data-cfgkey にフォールバック（保存/置換/差分/コピーで共通利用）。 */
function cfgPaneKey(paneEl, ta) {
  const sel = paneEl && paneEl.querySelector("select.cfgsrc");
  if (sel) return sel.value;
  return (ta && ta.dataset.cfgkey) || (paneEl && paneEl.dataset.cfgkey) || null;
}
/* 選択可能な source 一覧（現行 dev:* ＋ 前回 prev:* ＋ 既存の編集コピー scratch:*） */
function cfgSources() {
  const out = [];
  const host = id => (DATA.devices[id] && DATA.devices[id].hostname) || id;
  Object.keys(DATA.raw_configs || {}).sort().forEach(id => out.push({ key: "dev:" + id, label: host(id) }));
  Object.keys(DATA.raw_configs_prev || {}).sort().forEach(id => out.push({ key: "prev:" + id, label: host(id) + " (前回)" }));
  Object.keys(S.configScratch).sort().forEach(k => {
    if (k.startsWith("scratch:")) out.push({ key: k, label: host(k.slice(8)) + " (編集中)" });
  });
  return out;
}
/* LCS 行整列: a→b の編集列を順序付き ops に分類（決定的）。
   各 op は {t:"same",ai,bi} / {t:"del",ai}（a だけ＝削除） / {t:"add",bi}（b だけ＝追加）。
   skipped=true は大規模で整列省略（呼び出し側は素のまま描画する）。 */
function lineAlign(a, b) {
  const n = a.length, m = b.length;
  /* 同一テキストの早道（編集モード突入直後＝原本コピー等）: O(n) で全 same を返し DP を回避 */
  if (n === m) {
    let same = true;
    for (let k = 0; k < n; k++) { if (a[k] !== b[k]) { same = false; break; } }
    if (same) { const ops = []; for (let k = 0; k < n; k++) ops.push({ t: "same", ai: k, bi: k }); return { ops, skipped: false }; }
  }
  /* O(n*m) DP のメモリ上限ガード（n*m が 4000000 以上＝約 2000行×2000行で整列省略） */
  if (n * m >= 4000000) return { ops: [], skipped: true };
  const dp = [];   /* Int32Array で行確保（ゼロ初期化・JS Array より省メモリ・LCS 長は min(n,m) で int32 内） */
  for (let i = 0; i <= n; i++) dp.push(new Int32Array(m + 1));
  for (let i = n - 1; i >= 0; i--)
    for (let j = m - 1; j >= 0; j--)
      dp[i][j] = a[i] === b[j] ? dp[i + 1][j + 1] + 1 : Math.max(dp[i + 1][j], dp[i][j + 1]);
  const ops = [];
  let i = 0, j = 0;
  while (i < n && j < m) {
    if (a[i] === b[j]) { ops.push({ t: "same", ai: i, bi: j }); i++; j++; }
    else if (dp[i + 1][j] >= dp[i][j + 1]) { ops.push({ t: "del", ai: i }); i++; }
    else { ops.push({ t: "add", bi: j }); j++; }
  }
  while (i < n) { ops.push({ t: "del", ai: i }); i++; }
  while (j < m) { ops.push({ t: "add", bi: j }); j++; }
  return { ops, skipped: false };
}
function cfgDiffCounts(ops) {
  let adds = 0, dels = 0;
  for (const o of ops) { if (o.t === "add") adds++; else if (o.t === "del") dels++; }
  return { adds, dels };
}
/* 1 行の HTML（行番号セル＋本文。num=null は空セル・text=null は空行）。extraCls は前置きスペース込み */
function cfgLineHtml(num, text, extraCls) {
  const txt = text != null ? (esc(text) || "&nbsp;") : "&nbsp;";
  return `<div class="cfgline${extraCls || ""}"><span class="cfgln">${num != null ? num : ""}</span><span class="cfgtx">${txt}</span></div>`;
}
/* 比較（両ペイン読取）の対称整列: same=両側に行・del=左に行(赤)＋右に空行・add=左に空行＋右に行(緑)。
   両ペインの行数が一致＝完全整列。q は検索ヒット小文字。 */
function cfgSymRows(lLines, rLines, q) {
  const { ops, skipped } = lineAlign(lLines, rLines);
  const hitCls = ln => (!!q && ln != null && ln.toLowerCase().includes(q)) ? " hit" : "";
  if (skipped) {
    return { left: lLines.map((ln, i) => cfgLineHtml(i + 1, ln, hitCls(ln))).join(""),
             right: rLines.map((ln, i) => cfgLineHtml(i + 1, ln, hitCls(ln))).join(""),
             adds: 0, dels: 0, skipped: true };
  }
  const L = [], R = [];
  for (const o of ops) {
    if (o.t === "same") { L.push(cfgLineHtml(o.ai + 1, lLines[o.ai], hitCls(lLines[o.ai]))); R.push(cfgLineHtml(o.bi + 1, rLines[o.bi], hitCls(rLines[o.bi]))); }
    else if (o.t === "del") { L.push(cfgLineHtml(o.ai + 1, lLines[o.ai], " diff-del" + hitCls(lLines[o.ai]))); R.push(cfgLineHtml(null, null, " gap")); }
    else { L.push(cfgLineHtml(null, null, " gap")); R.push(cfgLineHtml(o.bi + 1, rLines[o.bi], " diff-add" + hitCls(rLines[o.bi]))); }
  }
  const { adds, dels } = cfgDiffCounts(ops);
  return { left: L.join(""), right: R.join(""), adds, dels, skipped: false };
}
/* 統一差分プレビュー（unified diff 形式・読取専用）: before と after を lineAlign で比較し
   same=コンテキスト行(ctx)・del=削除行(del・−)・add=追加行(add・+) として1ペインに並べる。
   q は検索クエリ（ヒット行に .hit を付ける）。skipped 時は after を全コンテキストとして返す。 */
function cfgUnifiedRows(before, after, q) {
  const { ops, skipped } = lineAlign(before, after);
  const { adds, dels } = skipped ? { adds: 0, dels: 0 } : cfgDiffCounts(ops);
  const hit = ln => !!q && ln.toLowerCase().includes(q);
  if (skipped) {
    const rows = after.map((ln, i) =>
      `<div class="urow ctx${hit(ln) ? " hit" : ""}"><span class="ug">${i + 1}</span><span class="us"> </span><span class="utx">${esc(ln) || "&nbsp;"}</span></div>`);
    return { html: rows.join(""), adds: 0, dels: 0, skipped: true };
  }
  const rows = [];
  for (const o of ops) {
    if (o.t === "same") {
      const ln = before[o.ai];
      rows.push(`<div class="urow ctx${hit(ln) ? " hit" : ""}" data-b="${o.bi}"><span class="ug">${o.ai + 1}</span><span class="us"> </span><span class="utx">${esc(ln) || "&nbsp;"}</span></div>`);
    } else if (o.t === "del") {
      const ln = before[o.ai];
      rows.push(`<div class="urow del${hit(ln) ? " hit" : ""}"><span class="ug">${o.ai + 1}</span><span class="us">−</span><span class="utx">${esc(ln) || "&nbsp;"}</span></div>`);
    } else {
      const ln = after[o.bi];
      rows.push(`<div class="urow add${hit(ln) ? " hit" : ""}" data-b="${o.bi}"><span class="ug"></span><span class="us">+</span><span class="utx">${esc(ln) || "&nbsp;"}</span></div>`);
    }
  }
  return { html: rows.join(""), adds, dels, skipped: false };
}
/* 行番号ガター HTML 生成: n 行ぶんの番号 div を返す。curIdx 行に "cur" クラスを付与。 */
function cfgGutHtml(n, curIdx) {
  let s = "";
  for (let i = 0; i < n; i++) s += `<div class="n${i === curIdx ? " cur" : ""}" data-i="${i}">${i + 1}</div>`;
  return s;
}
/* textarea のカーソル行インデックスを返す（0 始まり）。 */
function cfgCurLine(ta) {
  return ta.value.slice(0, ta.selectionStart).split("\n").length - 1;
}
/* CSS セレクタ内で使う属性値のエスケープ（" \ ] を安全化）。 */
function cssEsc(s) { return String(s).replace(/["\\\]]/g, "\\$&"); }
/* 編集モードのライブ差分更新: textarea 編集に応じて右 unified 差分・行番号ガター・差分カウントを更新。
   COMPARE モード（S.configSplit）は対象外。既存 300ms debounce から呼ばれる。 */
function updateCfgEditDiff(ta) {
  const rKey = ta.dataset.cfgkey;          /* "scratch:<cur>" */
  if (!rKey) return;
  const cur = rKey.replace(/^scratch:/, "");
  const before = cfgRawOf("dev:" + cur).replace(/\n$/, "").split("\n");
  const after = ta.value.replace(/\n$/, "").split("\n");
  const uni = cfgUnifiedRows(before, after, "");
  const uniEl = document.querySelector('[data-cfgunified="' + cssEsc(rKey) + '"]');
  if (uniEl) uniEl.innerHTML = uni.html;
  const gut = document.querySelector('[data-cfggut="E"]');
  if (gut) gut.innerHTML = cfgGutHtml(after.length, -1);
  const sum = document.querySelector('[data-cfgsum="' + cssEsc(rKey) + '"]');
  if (sum) sum.textContent = `+${uni.adds} \u2212${uni.dels}${uni.skipped ? " (差分省略:大規模)" : ""}`;
  cfgEditHighlightCur(ta);
}
/* カーソル行ハイライト: ガター行番号と unified diff の対応行に cur クラスを付与。 */
function cfgEditHighlightCur(ta) {
  const idx = cfgCurLine(ta);
  const gut = document.querySelector('[data-cfggut="E"]');
  if (gut) {
    gut.querySelectorAll(".n").forEach(el => el.classList.toggle("cur", +el.dataset.i === idx));
    gut.scrollTop = ta.scrollTop;
  }
  const rKey = ta.dataset.cfgkey;
  const uniEl = rKey ? document.querySelector('[data-cfgunified="' + cssEsc(rKey) + '"]') : null;
  if (uniEl) uniEl.querySelectorAll(".urow").forEach(el => el.classList.toggle("cur", el.dataset.b === String(idx)));
}
/* compat shim: 旧 updateCfgSplitDiff 呼び出し元（全置換ハンドラ）との互換を保つ。
   編集モードは updateCfgEditDiff へ委譲、COMPARE モードは何もしない（比較は再描画なし）。 */
function updateCfgSplitDiff() {
  if (!S.configEdit) return;
  const split = document.querySelector("#tableview .cfgsplit");
  if (!split) return;
  const ta = split.querySelector("textarea.cfgedit");
  if (!ta) return;
  updateCfgEditDiff(ta);
}
/* 2ペイン比較モード（読取専用・対称整列）。編集は「編集」モードへ分離（ここでは textarea を出さない）。 */
function renderCfgSplit(q) {
  const srcs = cfgSources();
  let lKey = S.configSrcL || ("dev:" + (S.configDev || "")) ;
  if (!srcs.some(s => s.key === lKey)) lKey = srcs[0].key;
  let rKey = S.configSrcR || (srcs[1] ? srcs[1].key : srcs[0].key);
  if (!srcs.some(s => s.key === rKey)) rKey = (srcs[1] || srcs[0]).key;
  const lLines = cfgTextOf(lKey).replace(/\n$/, "").split("\n");
  const rLines = cfgTextOf(rKey).replace(/\n$/, "").split("\n");
  const sym = cfgSymRows(lLines, rLines, q);

  const toolbar = `<div class="cfgtools">`
    + `<button class="tbtn on" data-cfgtoggle="split" title="2ペイン比較を終了">比較</button>`
    + `<button class="tbtn${S.configWrap ? " on" : ""}" data-cfgtoggle="wrap" title="長い行を折り返す">折返し</button>`
    + `<span class="cfgdiffsum">+${sym.adds} −${sym.dels}${sym.skipped ? " (差分省略:大規模)" : ""}</span>`
    + `<span class="sp"></span></div>`;

  const selOf = (key, pane) => `<select class="cfgsrc" data-cfgpane="${pane}">`
    + srcs.map(s => `<option value="${esc(s.key)}"${s.key === key ? " selected" : ""}>${esc(s.label)}</option>`).join("")
    + `</select>`;
  const pane = (key, side, rowsHtml) => `<div class="cfgpane">`
    + `<div class="cfgpane-h">${selOf(key, side)}`
    + `<button class="tbtn" data-cfgcopytext="${side}" title="このペインの内容をコピー">コピー</button></div>`
    + `<div class="cfgpre${S.configWrap ? " wrap" : ""}" data-cfgpre="${side}">${rowsHtml}</div>`
    + `</div>`;
  return toolbar + `<div class="cfgsplit">`
    + pane(lKey, "L", sym.left)
    + pane(rKey, "R", sym.right)
    + `</div>`;
}

/* ノード駆動編集モード（q=検索クエリ・cur=選択機器 id で固定）: 左=編集 textarea＋行番号ガター／
   右=統一差分プレビュー（読取専用・git 風）。source ドロップダウンは出さず data-cfgkey でペインの
   source を保持（保存/置換/差分/コピーの各ハンドラが cfgPaneKey でそこから解決）。 */
function renderCfgEdit(q, cur) {
  const host = (DATA.devices[cur] && DATA.devices[cur].hostname) || cur;
  const rKey = "scratch:" + cur;
  const before = cfgRawOf("dev:" + cur).replace(/\n$/, "").split("\n");
  const after = cfgTextOf(rKey).replace(/\n$/, "").split("\n");
  const uni = cfgUnifiedRows(before, after, q);

  const toolbar = `<div class="cfgtools">`
    + `<button class="tbtn on" data-cfgtoggle="edit" title="編集を終了して一覧に戻る">編集</button>`
    + `<span class="cfgdiffsum" data-cfgsum="${esc(rKey)}">+${uni.adds} −${uni.dels}${uni.skipped ? " (差分省略:大規模)" : ""}</span>`
    + `<div class="cfgreplace"><input class="cfgfind" data-cfgpane="E" placeholder="検索文字列" spellcheck="false">`
    + `<input class="cfgrepl" data-cfgpane="E" placeholder="置換文字列" spellcheck="false">`
    + `<button class="tbtn" data-cfgreplace="E" title="検索文字列をすべて置換">全置換</button>`
    + `<span class="cfgreplmsg" data-cfgpane="E"></span></div>`
    + `<span class="sp"></span>`
    + `<button class="tbtn" data-cfgrevert="${esc(cur + "")}" title="編集を破棄して原本に戻す">↩ 元に戻す</button>`
    + `<button class="tbtn" data-cfgdl="${esc(cur + "")}" title="編集後を ${esc(cfgFileName(host))} として保存">⬇ ダウンロード</button>`
    + `<button class="tbtn" data-cfgcopytext="E" title="編集後を全文コピー">📋 コピー</button>`
    + `</div>`;

  /* 左: 編集 textarea＋行番号ガター。data-cfgkey で scratch を保持 */
  const lPane = `<div class="cfgpane" data-cfgkey="${esc(rKey)}">`
    + `<div class="cfgpane-h"><span class="cfgsrc-fixed">${esc(host)} <span class="cfgedited">編集中</span></span></div>`
    + `<div class="cfgedit-wrap"><div class="cfgedit-gut" data-cfggut="E"></div>`
    + `<textarea class="cfgedit" data-cfgpane="E" data-cfgkey="${esc(rKey)}" spellcheck="false">${esc(cfgTextOf(rKey))}</textarea></div></div>`;

  /* 右: 統一差分プレビュー（読取専用・git 風）。data-cfgkey で dev:cur を保持 */
  const rPane = `<div class="cfgpane" data-cfgkey="dev:${esc(cur + "")}">`
    + `<div class="cfgpane-h"><span class="cfgsrc-fixed">${esc(host)} <span class="dim-t">vs 原本（差分プレビュー）</span></span></div>`
    + `<div class="cfgpre cfgunified" data-cfgunified="${esc(rKey)}">${uni.html}</div></div>`;

  return toolbar + `<div class="cfgsplit">` + lPane + rPane + `</div>`;
}

function renderConfigView() {
  const raw = DATA.raw_configs || {};
  const ids = Object.keys(raw).sort();
  if (!ids.length) {
    return '<div class="thead"><h3>CONFIG</h3><span class="cnt">0 件</span></div>'
      + '<div class="tnote" style="padding:18px 24px">保存された生 config がありません（再生成してください）。</div>';
  }
  /* 検索はグローバル検索バーを流用。演算子（host: 等）は素の値で扱い、未完演算子（"host:"）は
     値が空＝フィルタ無効として他の表ビューとカウント表示を整合させる */
  const q = searchQuery().value;
  const hostOf = id => (DATA.devices[id] && DATA.devices[id].hostname) || id;
  /* 検索: 機器名 / id / config 本文のいずれかにマッチする機器を残す（全文横断） */
  const match = id => !q || hostOf(id).toLowerCase().includes(q)
    || id.toLowerCase().includes(q) || raw[id].toLowerCase().includes(q);
  const shown = ids.filter(match);
  tableSearchFeedback(shown.length);

  const head = `<div class="thead"><h3>CONFIG</h3><span class="cnt">${ids.length} 機器${q ? ` / ${shown.length} 一致` : ""}</span></div>`
    + `<div class="cfgwarn">⚠ この表示は読み込んだ running-config を<b>原本のまま</b>含みます。`
    + `password / secret / community / 鍵 等の機密が含まれる場合があります（共有・保存時は取り扱い注意）。</div>`;
  if (!shown.length) {
    return head + '<div class="tnote" style="padding:18px 24px">一致する機器がありません。</div>';
  }
  /* 2ペイン比較・編集モード（横並び。新旧版は --diff-against 時に prev:* が source に出る） */
  if (S.configSplit) return head + renderCfgSplit(q);
  /* 選択機器: 未選択/不在/絞り込みで外れた場合は一致先頭へ（cur は常に shown 内） */
  let cur = S.configDev;
  if (!cur || shown.indexOf(cur) < 0) cur = shown[0];
  /* ノード駆動編集モード（選択機器の 編集前 vs 編集中）。編集対象は検索フィルタで切替えない
     （編集中はリスト非表示・トグルの scratch 生成と同じ全機器ベースで cur を解決し機器すり替えを防ぐ） */
  if (S.configEdit) {
    let ecur = S.configDev;
    if (!ecur || ids.indexOf(ecur) < 0) ecur = ids[0];
    return head + renderCfgEdit(q, ecur);
  }

  /* 行数は本文と同じ数え方（末尾改行を1つ除いてから分割）でリストと本文を一致させる */
  const lineCount = id => raw[id].replace(/\n$/, "").split("\n").length;
  const devList = shown.map(id => {
    const dirty = cfgIsDirty(String(id)) ? `<span class="cfgdirty" title="未保存の編集あり">●</span>` : "";
    return `<div class="cfgdev${id === cur ? " active" : ""}" data-cfgdev="${esc(id)}">`
      + `<span class="cfgdev-h">${esc(hostOf(id))}${dirty}</span>`
      + `<span class="cfgdev-c">${lineCount(id)} 行</span></div>`;
  }).join("");

  /* parse 状態モード: DATA.parse_status[cur] が行配列としてあれば 3 段階色分け可能 */
  const psArr = (DATA.parse_status || {})[cur];
  const parseOn = S.configParse && Array.isArray(psArr);

  /* 右ペイン本文: 末尾改行を除いて行分割し、行番号付きで描画（検索一致行をハイライト）。
     grep モード時は一致行のみ・parse未対応のみ時は unparsed 行のみ抜粋（元行番号を保持）。 */
  cfgHitIdx = -1;   /* ナビ位置をリセット（再描画ごと） */
  const lines = raw[cur].replace(/\n$/, "").split("\n");
  let hitCount = 0;
  const psCount = { parsed: 0, ignored: 0, unparsed: 0 };
  const rows = [];
  lines.forEach((ln, i) => {
    const hit = !!q && ln.toLowerCase().includes(q);
    if (hit) hitCount++;
    const ps = parseOn ? (psArr[i] || "unparsed") : null;
    if (ps && psCount[ps] !== undefined) psCount[ps]++;
    if (S.configGrep && q && !hit) return;                         /* grep: 一致行のみ */
    if (parseOn && S.configUnparsedOnly && ps !== "unparsed") return; /* 未対応のみ */
    /* ここは cfgLineHtml を使わない: parse 状態クラス(ps-*)と検索ナビ用 data-cfgi 属性が必要なため直書き */
    rows.push(`<div class="cfgline${hit ? " hit" : ""}${ps ? " ps-" + ps : ""}" data-cfgi="${i}">`
      + `<span class="cfgln">${i + 1}</span><span class="cfgtx">${esc(ln) || "&nbsp;"}</span></div>`);
  });
  const body = rows.join("");

  /* ツールバー: 折返し / 一致行のみ(grep) / parse状態 トグル・検索一致行ナビ・全文コピー */
  const navHtml = q
    ? `<span class="cfgnav"><button class="tbtn" data-cfgnav="prev" title="前の一致行">‹</button>`
      + `<span id="cfgnavpos">${hitCount ? "–/" + hitCount : "0/0"}</span>`
      + `<button class="tbtn" data-cfgnav="next" title="次の一致行">›</button> 一致行</span>`
    : "";
  const parseToggle = Array.isArray(psArr)
    ? `<button class="tbtn${S.configParse ? " on" : ""}" data-cfgtoggle="parse" title="parse できた行/未対応行を色分け">parse状態</button>`
      + (parseOn ? `<button class="tbtn${S.configUnparsedOnly ? " on" : ""}" data-cfgtoggle="unparsed" title="未対応行のみ抜粋">未対応のみ</button>` : "")
    : "";
  const legend = parseOn
    ? `<span class="cfglegend">`
      + `<span class="ps-parsed">■</span>parse済 ${psCount.parsed}`
      + ` <span class="ps-ignored">■</span>無視 ${psCount.ignored}`
      + ` <span class="ps-unparsed">■</span>未対応 ${psCount.unparsed}</span>`
    : "";
  const toolbar = `<div class="cfgtools">`
    + `<button class="tbtn" data-cfgtoggle="edit" title="選択中の機器を編集（編集前 vs 編集中）">編集</button>`
    + `<button class="tbtn" data-cfgtoggle="split" title="2つの config を横並び比較">比較</button>`
    + `<button class="tbtn${S.configWrap ? " on" : ""}" data-cfgtoggle="wrap" title="長い行を折り返す">折返し</button>`
    + `<button class="tbtn${S.configGrep ? " on" : ""}" data-cfgtoggle="grep" title="検索一致行のみ抜粋">一致行のみ</button>`
    + parseToggle
    + navHtml
    + legend
    + `<span class="sp"></span>`
    + `<button class="tbtn" data-cfgcopy="${esc(cur)}" title="この config 全文をコピー">コピー</button></div>`;

  return head + toolbar
    + `<div class="cfgwrap"><div class="cfglist">${devList}</div>`
    + `<div class="cfgbody"><div class="cfgbody-h">${esc(hostOf(cur))} <span class="dim-t">(${esc(cur)})</span></div>`
    + `<div class="cfgpre${S.configWrap ? " wrap" : ""}">${body}</div></div></div>`;
}

/* ================= DIFF view (D3b トポロジー差分表示) ================= */
function renderDiffView() {
  /* グローバル DIFF が null/undefined のとき（タブが出ないはずだが）安全に空表示 */
  if (!DIFF) {
    return '<div class="thead"><h3>DIFF</h3><span class="cnt">—</span></div>'
      + '<div class="tnote" style="padding:18px 24px">差分データがありません（--diff-against なし）。</div>';
  }

  /* セクション固定順（決定的描画） */
  const SECTIONS = [
    ["devices", "Devices"],
    ["interfaces", "Interfaces"],
    ["links", "Links"],
    ["segments", "Segments"],
    ["routing_bgp", "Routing / BGP"],
    ["routing_ospf", "Routing / OSPF"],
    ["routing_static", "Routing / Static"],
  ];

  /* エントリのラベル（セクション別・XSS エスケープ済み） */
  function entryLabel(sec, e) {
    if (sec === "devices")   return esc(e.id || String(e));
    if (sec === "interfaces") return esc(e.id || String(e));
    if (sec === "links")     return esc((e.subnet||"") + "  " + (e.a_device||"") + "::" + (e.a_if||"") + " -- " + (e.b_device||"") + "::" + (e.b_if||""));
    if (sec === "segments")  return esc(e.id || String(e));
    if (sec === "routing_bgp")    return esc((e.device||"") + " -> " + (e.neighbor_ip||"") + " (" + (e.af||"") + ")");
    if (sec === "routing_ospf")   return esc((e.device||"") + " network=" + (e.network||"") + " (" + (e.af||"") + ")");
    if (sec === "routing_static") return esc((e.device||"") + " prefix=" + (e.prefix||"") + " (" + (e.af||"") + ")");
    return esc(String(e));
  }
  function changedLabel(sec, ch) {
    if (sec === "devices" || sec === "interfaces" || sec === "segments") return esc(ch.id || String(ch));
    if (sec === "routing_bgp")    return esc((ch.device||"") + " -> " + (ch.neighbor_ip||"") + " (" + (ch.af||"") + ")");
    if (sec === "routing_ospf")   return esc((ch.device||"") + " network=" + (ch.network||"") + " (" + (ch.af||"") + ")");
    if (sec === "routing_static") return esc((ch.device||"") + " prefix=" + (ch.prefix||"") + " (" + (ch.af||"") + ")");
    return esc(String(ch));
  }

  /* 全体の総変更件数 */
  let totalChanges = 0;
  for (const [sec] of SECTIONS) {
    const s = DIFF[sec] || {};
    totalChanges += (s.added||[]).length + (s.removed||[]).length + (s.changed||[]).length;
  }

  if (totalChanges === 0) {
    return '<div class="thead"><h3>DIFF</h3><span class="cnt">差分なし</span></div>'
      + '<div class="tnote" style="padding:18px 24px">差分なし — 前回と同一のトポロジーです。</div>';
  }

  let html = `<div class="thead"><h3>DIFF</h3><span class="cnt">計 ${totalChanges} 件</span></div>`;
  html += '<table class="dt" style="max-width:1080px;margin:0 24px 48px">';
  html += '<tr><th style="width:120px">Kind</th><th>Entry</th></tr>';

  for (const [sec, label] of SECTIONS) {
    const s = DIFF[sec] || {};
    const added   = s.added   || [];
    const removed = s.removed || [];
    const changed = s.changed || [];
    const n = added.length + removed.length + changed.length;
    if (n === 0) continue;
    const summary = `+${added.length} -${removed.length} ~${changed.length}`;
    html += `<tr><td colspan="2" style="background:var(--panel);padding:7px 6px;font-size:11px;letter-spacing:.06em;border-top:1px solid var(--panel-edge)">`
          + `<b>${esc(label)}</b> <span style="color:var(--ink-dim);margin-left:8px;font-size:10px">${esc(summary)}</span></td></tr>`;
    for (const e of added) {
      html += `<tr class="trow"><td style="color:var(--search);font-size:11px">+added</td><td>${entryLabel(sec, e)}</td></tr>`;
    }
    for (const e of removed) {
      html += `<tr class="trow"><td style="color:var(--danger);font-size:11px">-removed</td><td>${entryLabel(sec, e)}</td></tr>`;
    }
    for (const ch of changed) {
      html += `<tr class="trow"><td style="color:var(--accent);font-size:11px">~changed</td><td>${changedLabel(sec, ch)}`;
      const fields = ch.fields || {};
      const fieldKeys = Object.keys(fields).sort();
      if (fieldKeys.length) {
        html += '<br><span style="font-size:10px;color:var(--ink-dim)">';
        for (const f of fieldKeys) {
          const [ov, nv] = fields[f];
          html += `${esc(f)}: ${esc(JSON.stringify(ov))} → ${esc(JSON.stringify(nv))}  `;
        }
        html += '</span>';
      }
      html += '</td></tr>';
    }
  }
  html += "</table>";
  return html;
}

function renderIfsTable() {
  /* 整合性チェック: リンク両端の MTU / 速度不一致（速度は表記ゆれ正規化後に比較） */
  const norm = s => SPEED_NORM[s] || s;
  const ifByName = (dev, n) => DATA.devices[dev].ifs.find(i => i.n === n);
  const bad = {};
  for (const l of DATA.links) {
    const ia = ifByName(l.a, l.ai), ib = ifByName(l.b, l.bi);
    if (!ia || !ib) continue;
    const mark = (key, dev, ifn, peerDev, peerIf, val) =>
      ((bad[`${dev}:${ifn}`] ||= {})[key] = `対向 ${DATA.devices[peerDev].hostname} ${peerIf} (${val}) と不一致`);
    if (ia.mtu != null && ib.mtu != null && ia.mtu !== ib.mtu) {
      mark("mtu", l.a, l.ai, l.b, l.bi, ib.mtu); mark("mtu", l.b, l.bi, l.a, l.ai, ia.mtu);
    }
    if (ia.sp && ib.sp && norm(ia.sp) !== norm(ib.sp)) {
      mark("sp", l.a, l.ai, l.b, l.bi, ib.sp); mark("sp", l.b, l.bi, l.a, l.ai, ia.sp);
    }
  }
  /* 全 IF 行（種別・対向込み） */
  const allRows = [];
  for (const [id,d] of Object.entries(DATA.devices))
    for (const i of d.ifs)
      allRows.push({ dev:d.hostname, devId:id, ifn:i.n, ip:i.ip, ip6:i.ip6, desc:i.d, st:i.st,
                     mtu:i.mtu, sp:i.sp, vendor:d.vendor, as:String(d.as), chk: bad[`${id}:${i.n}`] || null,
                     kind: ifKind(id, i), conn: connectedTo(id, i.n),
                     addrs: i.addrs||[], v6list: ifV6List(i), ospf: i.ospf||null });
  /* 検索フィルタ + 種別チップフィルタ（down は st 基準 / 予約・不可 は運用状態基準 / 他は kind 基準） */
  const kf = S.ifKindFilter;
  const rows = allRows.filter(r => rowSearchHit({
      host:r.dev.toLowerCase(), ip:[r.ip,r.ip6,...r.addrs.map(a=>a.ip)].filter(Boolean).join(" ").toLowerCase(),
      desc:(r.desc||"").toLowerCase(), as:r.as, vendor:r.vendor.toLowerCase(), ifn:r.ifn.toLowerCase(),
      net:[r.ip && netOfV4(r.ip), r.ip6 && IP2NET[r.ip6.split("/")[0]]].filter(Boolean).join(" ").toLowerCase() })
    && (kf === "all" ? true
        : kf === "down" ? r.st === "down"
        : kf === "reserved" || kf === "disabled" ? effRole(r.devId, r.ifn) === kf
        : r.kind === kf));
  tableSearchFeedback(rows.length);

  const keyFns = {
    ifn: r => naturalKey(r.ifn),
    ip:  r => r.ip  ? [0, ipToU32(r.ip.split("/")[0]), ""] : [1, 0, ""],
    ip6: r => r.ip6 ? [0, 0, r.ip6] : [1, 0, ""],
    mtu: r => r.mtu == null ? [1, 0] : [0, r.mtu],
    sp:  r => r.sp == null ? [1, 0] : [0, +(SPEED_NORM[r.sp] || r.sp) || 0],
  };
  /* 機器ごとにグループ化（ADDRESSES の grph/折りたたみ基盤を流用。キーは "dev:<id>"） */
  const tsvLines = ["Device\tInterface\tConnected to\tType\tPortState\tIPv4\tIPv6\tDescription\tStatus\tMTU\tSpeed\t備考"];
  const connLabel = r => r.conn ? r.conn.label : (r.kind === "stub" ? "(stub)" : "—");
  /* カテゴリ別カウント（使用/予約/不可/空き）を非ゼロのみ色付きで連結 */
  const catSpans = c => ["used","reserved","disabled","free"].filter(k => c[k])
    .map(k => `<span class="c-${k==="reserved"?"rsv":k==="disabled"?"dis":k}">${CAT_LABEL[k]}${c[k]}</span>`).join(" ");
  let body = "";
  const renderedKeys = [];   /* フィルタ後に実描画したグループキー（全展開判定用） */
  for (const [id,d] of Object.entries(DATA.devices)) {
    const grpRows = rows.filter(r => r.devId === id);
    if (!grpRows.length) continue;
    renderedKeys.push("dev:"+id);
    /* ポート集計は検索/フィルタに依存しない全物理 IF から（容量は絶対値） */
    const phys = d.ifs.filter(i => isPhysical(i.n));
    const tally = list => { const c = {used:0,reserved:0,disabled:0,free:0}; for (const i of list) c[portCat(id, i)]++; return c; };
    const devCat = tally(phys);
    const cardMap = new Map();
    for (const i of phys) { const c = lineCard(i.n); if (!cardMap.has(c)) cardMap.set(c, []); cardMap.get(c).push(i); }
    const cardEntries = [...cardMap];
    const closed = S.collapsedNets.has("dev:"+id);
    /* 見出し: 1行目=機器名、2行目=機器サマリ、以降=カードごとの状態別カウント */
    const cardLines = cardEntries.map(([c, list], idx) => {
      const tree = idx === cardEntries.length - 1 ? "└" : "├";
      return `${tree} ${esc(c.padEnd(22))} ${catSpans(tally(list))}  <span class="dim-t">(${list.length})</span>`;
    }).join("\n");
    body += `<tr class="grph" data-grp="dev:${esc(id)}"><td colspan="10"><span class="ghtop">${closed?"▸":"▾"} ${esc(d.hostname)} <span class="dim-t">[${esc(d.vendor)}]</span>` +
      `<span class="usage">物理${phys.length}ポート ${catSpans(devCat)}</span></span>` +
      (!closed && cardLines ? `<div class="cards2">${cardLines}</div>` : "") + `</td></tr>`;
    const members = S.sort.ifs ? sortRows(grpRows, S.sort.ifs, keyFns)
                               : [...grpRows].sort((a,b) => cmpVal(naturalKey(a.ifn), naturalKey(b.ifn)));
    for (const r of members) {
      const cl = connLabel(r);
      const eff = effRole(r.devId, r.ifn);
      const physical = isPhysical(r.ifn);
      tsvLines.push([r.dev, r.ifn, cl, IFK_LABEL[r.kind], physical?CAT_LABEL[portCat(r.devId, DATA.devices[r.devId].ifs.find(x=>x.n===r.ifn))]:"", r.ip||"", r.ip6||"", r.desc||"", r.st, r.mtu==null?"":r.mtu, r.sp||"", noteOf(r.devId, r.ifn).replace(/\t/g," ")].join("\t"));
      if (closed) continue;
      const jump = r.conn && r.conn.peerDev;
      const connCell = jump
        ? `<td class="peer-jump" data-peer="${esc(r.conn.peerDev)}:${esc(r.conn.peerIf)}" title="${esc(r.conn.sub||"")}">${esc(cl)}</td>`
        : `<td class="dim-t"${r.conn&&r.conn.sub?` title="${esc(r.conn.sub)}"`:""}>${esc(cl)}</td>`;
      const ovBadge = eff ? `<span class="ifk ifk-${eff==="reserved"?"rsv":"dis"}">${eff==="reserved"?"予約":"使用不可"}</span>` : "";
      const setCell = physical
        ? `<td><button class="portset ${eff?"set-"+eff:""}" data-portset="${esc(r.devId)}:${esc(r.ifn)}" title="クリックで − → 予約 → 使用不可 を循環（ブラウザに保存）">${eff==="reserved"?"予約":eff==="disabled"?"不可":"−"}</button></td>`
        : `<td class="dim-t">—</td>`;
      body += `<tr class="trow" data-row="${esc(r.devId)}:${esc(r.ifn)}">
        <td>${esc(r.ifn)}</td>
        ${connCell}
        <td class="dim-t">${r.ip?esc(r.ip):"—"}</td>
        <td class="dim-t">${r.v6list.length ? r.v6list.map(x=>x.ll?`<span class="ll-t">${esc(x.cidr)}</span>`:esc(x.cidr)).join("<br>") : "—"}</td>
        <td class="${r.desc?"dim-t":"no-desc"}"${r.desc?"":' title="description 未設定"'}>${r.desc?esc(r.desc):"—"}</td>
        <td class="${r.st==="up"?"st-up":"st-down"}">${esc(r.st)}<span class="ifk ifk-${r.kind==="connected"?"conn":r.kind==="loopback"?"loop":r.kind}">${IFK_LABEL[r.kind]}</span>${ovBadge}</td>
        <td class="${r.chk&&r.chk.mtu?"chk-bad":"dim-t"}"${r.chk&&r.chk.mtu?` title="${esc(r.chk.mtu)}"`:""}>${r.mtu==null?"—":r.mtu}${r.chk&&r.chk.mtu?" ⚠":""}</td>
        <td class="${r.chk&&r.chk.sp?"chk-bad":"dim-t"}"${r.chk&&r.chk.sp?` title="${esc(r.chk.sp)}"`:""}>${r.sp?esc(r.sp):"—"}${r.chk&&r.chk.sp?" ⚠":""}</td>
        ${setCell}
        <td><input class="noteinput" data-note="${esc(r.devId)}:${esc(r.ifn)}" value="${esc(noteOf(r.devId, r.ifn))}" placeholder="メモ…" autocomplete="off"></td></tr>`;
    }
  }
  lastTsv = tsvLines.join("\n");
  const chip = (v, label) => `<button class="tbtn ${kf===v?"on":""}" data-ifk="${v}">${label}</button>`;
  /* 全展開/全折りたたみ判定は実描画したグループ（フィルタ後）で算出 */
  const allCollapsed = renderedKeys.length > 0 && renderedKeys.every(k => S.collapsedNets.has(k));
  return `<div class="thead"><h3>INTERFACES</h3><span class="cnt">${rows.length} 行</span>
      ${chip("all","ALL")}${chip("connected","接続")}${chip("stub","スタブ")}${chip("unused","未使用")}${chip("reserved","予約")}${chip("disabled","不可")}${chip("down","down")}
      <button class="tbtn" data-foldall="${allCollapsed?"open":"close"}">${allCollapsed?"全展開":"全折りたたみ"}</button>
      <span class="sp"></span>
      <button class="tbtn" data-copy="1" title="フィルタ通過した全行をTSVでコピー（折りたたみ中の行も含む）">コピー</button></div>
    <table class="dt"><tr>${thSort("ifs","ifn","Interface")}<th>Connected to</th>${thSort("ifs","ip","IPv4")}${thSort("ifs","ip6","IPv6")}${thSort("ifs","desc","Description")}${thSort("ifs","st","Status")}${thSort("ifs","mtu","MTU")}${thSort("ifs","sp","Speed")}<th>指定</th><th>備考</th></tr>
    ${body}</table>
    <div class="tnote">見出し = 機器ごとの物理ポート状態（<span class="c-used">使用</span>/<span class="c-rsv">予約</span>/<span class="c-dis">不可</span>/<span class="c-free">空き</span>・ラインカード別内訳）。見出しクリックで折りたたみ /
    種別: <span class="ifk ifk-conn">接続</span>・<span class="ifk ifk-stub">スタブ</span>（IPありだが対向なし）・<span class="ifk ifk-unused">未使用</span>（IP/description とも無し）・<span class="ifk ifk-loop">loopback</span> /
    <b>指定</b>列のボタンで <span class="ifk ifk-rsv">予約</span> / <span class="ifk ifk-dis">使用不可</span> を循環指定・<b>備考</b>列に予約理由などのメモを記入（いずれもブラウザに永続保存。実装版では config と分離した運用アノテーション） /
    Connected to の青字はクリックで対向IF行へジャンプ / ⚠ 赤 = MTU/速度不一致 / 列ヘッダクリックでソート（既定はIF名自然順）</div>`;
}

/* 表ビューの操作（ソート / 折りたたみ / 種別フィルタ / 対向ジャンプ / コピー）はイベント委譲で */
$("#tableview").addEventListener("click", ev => {
  const th = ev.target.closest("th.sortable");
  if (th) {
    const view = S.view === "addr" ? "addr" : "ifs";
    const cur = S.sort[view], key = th.dataset.key;
    S.sort[view] = !cur || cur.key !== key ? {key, dir:"asc"}
                 : cur.dir === "asc" ? {key, dir:"desc"} : null;
    renderTableView(); return;
  }
  /* INTERFACES 種別フィルタチップ */
  const ifk = ev.target.closest("[data-ifk]");
  if (ifk) { S.ifKindFilter = ifk.dataset.ifk; renderTableView(); return; }
  /* ポート状態指定ボタン（− → 予約 → 使用不可 を循環・永続保存） */
  const ps = ev.target.closest("[data-portset]");
  if (ps) { const [pd, ...rest] = ps.dataset.portset.split(":"); cyclePortRole(pd, rest.join(":")); renderTableView(); return; }
  /* Connected to（リンク対向）クリック → 対向IF行へジャンプ */
  const pj = ev.target.closest("[data-peer]");
  if (pj) {
    const peer = pj.dataset.peer, pdev = peer.split(":")[0];
    S.collapsedNets.delete("dev:"+pdev);   /* 折りたたみ中なら開く */
    renderTableView();
    const target = $(`#tableview [data-row="${peer}"]`);
    if (target) { target.scrollIntoView({block:"center", behavior:"smooth"}); target.classList.add("row-flash"); }
    return;
  }
  const gr = ev.target.closest("tr.grph");
  if (gr) {
    const k = gr.dataset.grp;
    if (S.collapsedNets.has(k)) S.collapsedNets.delete(k); else S.collapsedNets.add(k);
    renderTableView(); return;
  }
  const fa = ev.target.closest("[data-foldall]");
  if (fa) {
    if (fa.dataset.foldall === "open") S.collapsedNets.clear();
    else document.querySelectorAll("#tableview tr.grph").forEach(t => S.collapsedNets.add(t.dataset.grp));
    renderTableView(); return;
  }
  const cp = ev.target.closest("[data-copy]");
  if (cp) { copyTsv(cp); return; }
  /* CONFIG ビュー: 左ペインの機器クリックで本文を切替 */
  const cd = ev.target.closest("[data-cfgdev]");
  if (cd) { S.configDev = cd.dataset.cfgdev; renderTableView(); return; }
  /* CONFIG 編集: ダウンロード（編集後テキストをファイル保存） */
  const dlb = ev.target.closest("[data-cfgdl]");
  if (dlb) {
    const cur = dlb.dataset.cfgdl;
    const host = (DATA.devices[cur] && DATA.devices[cur].hostname) || cur;
    downloadText(cfgFileName(host), cfgTextOf("scratch:" + cur));
    return;
  }
  /* CONFIG 編集: 元に戻す（scratch を破棄して原本に戻す） */
  const rvb = ev.target.closest("[data-cfgrevert]");
  if (rvb) {
    const cur = rvb.dataset.cfgrevert;
    delete S.configScratch["scratch:" + cur];
    saveCfgScratch();
    renderTableView();
    return;
  }
  /* CONFIG ツールバー: 折返し / grep トグル */
  const ct = ev.target.closest("[data-cfgtoggle]");
  if (ct) {
    const t = ct.dataset.cfgtoggle;
    if (t === "wrap") S.configWrap = !S.configWrap;
    else if (t === "grep") S.configGrep = !S.configGrep;
    else if (t === "parse") S.configParse = !S.configParse;
    else if (t === "unparsed") S.configUnparsedOnly = !S.configUnparsedOnly;
    else if (t === "split") { S.configSplit = !S.configSplit; if (S.configSplit) S.configEdit = false; }
    else if (t === "edit") {
      S.configEdit = !S.configEdit;
      if (S.configEdit) {
        S.configSplit = false;
        /* 選択機器の編集コピーを原本から生成（既存編集は温存）。表示は cfgTextOf が原本フォールバック */
        const keys = Object.keys(DATA.raw_configs || {}).sort();
        let cur = S.configDev;
        if (!cur || keys.indexOf(cur) < 0) cur = keys[0];
        const sk = "scratch:" + cur;
        if (cur && S.configScratch[sk] == null) { S.configScratch[sk] = cfgRawOf("dev:" + cur); saveCfgScratch(); }
      }
    }
    renderTableView(); return;
  }
  /* CONFIG 2ペイン/編集: ペイン内容コピー（toolbar の E ボタンは .cfgpane 外なので直接解決） */
  const cpt = ev.target.closest("[data-cfgcopytext]");
  if (cpt) {
    const pane = cpt.dataset.cfgcopytext;
    /* 編集モード(E): toolbar は .cfgpane 外 → closest が null になるため textarea を直接解決 */
    const ta = pane === "E"
      ? document.querySelector('textarea.cfgedit[data-cfgpane="E"]')
      : (cpt.closest(".cfgpane") && cpt.closest(".cfgpane").querySelector("textarea.cfgedit"));
    const paneEl = ta ? ta.closest(".cfgpane") : cpt.closest(".cfgpane");
    const key = cfgPaneKey(paneEl, ta);   /* 自由比較=select / 編集モード=data-cfgkey */
    copyText(ta ? ta.value : (key ? cfgTextOf(key) : ""), cpt);
    return;
  }
  /* CONFIG 編集ペイン: リテラル全置換（検索文字列→置換文字列・全件）。再描画せず value 直接更新でフォーカス保持 */
  /* toolbar の E ボタンは .cfgpane 外なので textarea/inputs を直接解決（HIGH-2 修正） */
  const crp = ev.target.closest("[data-cfgreplace]");
  if (crp) {
    const pane = crp.dataset.cfgreplace;
    let paneEl, ta, find, repl, msg;
    if (pane === "E") {
      /* 編集モード: toolbar は .cfgpane 外なので各要素を document から直接解決 */
      ta = document.querySelector('textarea.cfgedit[data-cfgpane="E"]');
      find = document.querySelector('input.cfgfind[data-cfgpane="E"]');
      repl = document.querySelector('input.cfgrepl[data-cfgpane="E"]');
      msg = document.querySelector('.cfgreplmsg[data-cfgpane="E"]');
      paneEl = ta ? ta.closest(".cfgpane") : null;
    } else {
      paneEl = crp.closest(".cfgpane");
      ta = paneEl && paneEl.querySelector("textarea.cfgedit");
      find = paneEl && paneEl.querySelector("input.cfgfind");
      repl = paneEl && paneEl.querySelector("input.cfgrepl");
      msg = paneEl && paneEl.querySelector(".cfgreplmsg");
    }
    const key = ta && cfgPaneKey(paneEl, ta);   /* 自由比較=select / 編集モード=data-cfgkey */
    if (ta && key && find) {
      const f = find.value;
      if (!f) { if (msg) msg.textContent = "検索文字列が空です"; return; }
      const n = ta.value.split(f).length - 1;            /* リテラル一致件数 */
      ta.value = ta.value.split(f).join(repl ? repl.value : "");
      S.configScratch[key] = ta.value; saveCfgScratch();
      if (pane === "E") updateCfgEditDiff(ta); else updateCfgSplitDiff();
      if (msg) msg.textContent = n + " 件置換";
    }
    return;
  }
  /* CONFIG 検索一致行ナビ: 再描画せず一致行へスクロール（フォーカス保持） */
  const cn = ev.target.closest("[data-cfgnav]");
  if (cn) {
    const hits = [...document.querySelectorAll("#tableview .cfgline.hit")];
    if (hits.length) {
      hits.forEach(h => h.classList.remove("cur"));
      /* 初回（cfgHitIdx=-1）は next→先頭・prev→末尾を選ぶ */
      if (cfgHitIdx < 0) cfgHitIdx = cn.dataset.cfgnav === "next" ? 0 : hits.length - 1;
      else cfgHitIdx = cn.dataset.cfgnav === "next"
        ? (cfgHitIdx + 1) % hits.length
        : (cfgHitIdx - 1 + hits.length) % hits.length;
      const el = hits[cfgHitIdx];
      el.classList.add("cur");
      el.scrollIntoView({ block: "center", behavior: "smooth" });
      const pos = document.getElementById("cfgnavpos");
      if (pos) pos.textContent = (cfgHitIdx + 1) + "/" + hits.length;
    }
    return;
  }
  /* CONFIG 全文コピー */
  const cc = ev.target.closest("[data-cfgcopy]");
  if (cc) { copyText((DATA.raw_configs || {})[cc.dataset.cfgcopy] || "", cc); return; }
});
/* 備考メモの編集確定（blur / Enter で change が発火）→ 永続保存。再描画は不要（値は DOM 反映済み） */

/* CONFIG 編集モード: textarea 入力 → scratch 保存＋ライブ差分更新（debounce 300ms）。
   保存は即時（cfgPaneKey で key 解決）、差分再計算のみ debounce。 */
let _cfgDiffTimer = null;
$("#tableview").addEventListener("input", ev => {
  const ta = ev.target.closest("textarea.cfgedit");
  if (!ta) return;
  const paneEl = ta.closest(".cfgpane");
  const key = cfgPaneKey(paneEl, ta);   /* 自由比較=select / 編集モード=data-cfgkey */

["keyup", "click"].forEach(evName => {

/* 編集モードの縦スクロール同期: textarea ⇄ 行番号ガター の scrollTop を合わせる
   （scroll はバブリングしないため capture フェーズで受ける。再入は _cfgScrollLock で防止）。 */
let _cfgScrollLock = false;
$("#tableview").addEventListener("scroll", ev => {
  if (!S.configEdit || _cfgScrollLock) return;
  const t = ev.target;
  if (!t.closest) return;
  const split = t.closest(".cfgsplit");
  if (!split) return;
  const ta = split.querySelector("textarea.cfgedit");
  const gut = split.querySelector('[data-cfggut="E"]');
  if (!ta || (t !== ta && t !== gut)) return;
  _cfgScrollLock = true;
  if (t === ta) { if (gut) gut.scrollTop = ta.scrollTop; } else ta.scrollTop = t.scrollTop;
  _cfgScrollLock = false;
}, true);
function copyTsv(btn) {
  const done = () => { btn.textContent = "✓"; setTimeout(() => { btn.textContent = "コピー"; }, 900); };
  const fallback = () => {
    const ta = document.createElement("textarea");
    ta.value = lastTsv; document.body.appendChild(ta); ta.select();
    try { document.execCommand("copy"); } catch (e) { /* clipboard 不可環境では無視 */ }
    ta.remove(); done();
  };
  if (navigator.clipboard && navigator.clipboard.writeText)
    navigator.clipboard.writeText(lastTsv).then(done, fallback);
  else fallback();
}
/* config ダウンロード用ファイル名生成（ホスト名の危険文字を _ 置換） */
function cfgFileName(host) {
  const s = String(host).replace(/[^A-Za-z0-9._-]/g, "_").replace(/^\.+$/, "");
  return (s || "config") + ".cfg";
}
/* テキストファイルをブラウザダウンロード */
function downloadText(name, text) {
  const blob = new Blob([text], { type: "text/plain" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = name;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(a.href), 5000);
}
/* 任意テキストをクリップボードへ（copyTsv の汎用版・ボタンに ✓ フィードバック） */
function copyText(text, btn) {
  const orig = btn.textContent;
  const done = () => { btn.textContent = "✓"; setTimeout(() => { btn.textContent = orig; }, 900); };
  const fallback = () => {
    const ta = document.createElement("textarea");
    ta.value = text; document.body.appendChild(ta); ta.select();
    try { document.execCommand("copy"); } catch (e) { /* clipboard 不可環境では無視 */ }
    ta.remove(); done();
  };
  if (navigator.clipboard && navigator.clipboard.writeText)
    navigator.clipboard.writeText(text).then(done, fallback);
  else fallback();
}

/* ================= legend / minimap / status ================= */
function renderLegend() {
  const L = $("#legend");
  L.style.display = (S.legend && !isTableView()) ? "" : "none";
  /* clk 付きの項目はクリックで該当要素を強調（再クリックで解除） */
  const clk = (lg, sw, label) => `<div class="li clk${S.legendHot===lg?" on":""}" data-lg="${lg}">${sw}${label}</div>`;
  /* stub/loopback ノードが現在のビューで描画されるか（OSPF は area あり=参加のみ） */
  const stubVisible = kind => (DATA.stub_nodes || []).some(st => st.kind === kind && (S.view !== "ospf" || st.area));
  /* 現在のビューに描画される要素だけ凡例に載せる */
  let rows = `<h4>LEGEND — ${S.view.toUpperCase()}</h4>
    <div class="li"><span class="sw box"></span>機器</div>
    ${S.view !== "bgp" ? '<div class="li"><span class="sw seg"></span>セグメント</div>' : ""}
    ${S.view !== "bgp" && stubVisible("stub") ? clk("stub",'<span class="sw stub2"></span>',"スタブ") : ""}
    ${S.view !== "bgp" && stubVisible("loopback") ? clk("loopback",'<span class="sw lp"></span>',"loopback") : ""}
    <div class="li"><span class="sw"></span>リンク</div>
    ${S.view === "physical" ? clk("admin-down",'<span class="sw dash"></span>',"admin_down") : ""}`;
  /* 表示条件は render の showBgp/showOspf と同一式（凡例と描画の不一致防止） */
  if (S.view === "bgp") {
    rows += clk("ebgp",`<span class="sw" style="border-color:${BGP_COLOR.ebgp}"></span>`,"eBGP")
      + clk("ibgp",`<span class="sw dash" style="border-color:${BGP_COLOR.ibgp}"></span>`,"iBGP (loopback)")
      + `<div class="li"><span class="sw box" style="border-style:dashed"></span>外部AS (config未提供)</div>`;
    /* RR 構成が存在する場合のみ Route Reflector 凡例を追加（データ駆動） */
    const _roles = bgpRoles();
    if (_roles.rr.size) {
      rows += clk("rr",'<span class="sw rr"></span>',"Route Reflector")
        + clk("rrc",'<span class="sw rrc"></span>',"RR Client")
        + clk("rrarrow",'<span class="sw rrarrow"></span>',"reflects-to");
    }
    /* AS 別一括強調: 実在 AS をデータ駆動で列挙（B4） */
    for (const a of presentASes(DATA))
      rows += clk(`as:${a}`,`<span class="sw" style="border-color:${asColor(a)}"></span>`,`AS ${a}`);
  }
  if (S.view === "ospf") {
    /* 実在 OSPF area をデータ駆動で列挙（B4: ハードコード area:0/area:1 を撤廃） */
    for (const a of presentAreas(DATA))
      rows += clk(`area:${a}`,`<span class="sw" style="border-color:${areaColor(String(a))}"></span>`,`area ${a}`);
  }
  rows += `<div class="note">点線・色付き線の項目はクリックで<br>該当要素を強調（再クリックで解除）</div>`;
  L.innerHTML = rows;
}

/* ================= interactions ================= */
const canvas = $("#canvas");

/* pan + node drag + click/dblclick */
let drag = null, didDrag = false;
canvas.addEventListener("mousedown", ev => {
  const g = ev.target.closest("[data-elem='dev'],[data-elem='seg'],[data-elem='ext']");
  /* POS に座標を持つノード（device/segment/ext）のみドラッグ対象。
     stub/loopback も data-elem="seg" だが POS 非登録（親デバイスからの派生扇状配置）なので
     node=null＝pan にフォールバック（POS[id] undefined 参照のクラッシュ防止＝非ドラッグ仕様）。 */
  const node = (g && POS[g.dataset.id]) ? g.dataset.id : null;
  drag = {
    sx: ev.clientX, sy: ev.clientY, moved: false,
    node,
    ox: node ? POS[node].x : S.tx,
    oy: node ? POS[node].y : S.ty,
  };
  canvas.classList.add("dragging");
});
window.addEventListener("mousemove", ev => {
  if (drag) {
    const dx = ev.clientX - drag.sx, dy = ev.clientY - drag.sy;
    if (Math.abs(dx) + Math.abs(dy) > 4) drag.moved = true;
    if (!drag.moved) return;
    if (drag.node) { POS[drag.node].x = drag.ox + dx / S.k; POS[drag.node].y = drag.oy + dy / S.k; schedule(render); }
    else { S.tx = drag.ox + dx; S.ty = drag.oy + dy; schedule(applyTransform); }
    return;
  }
  if (rs) { hideTip(); return; }   /* パネルリサイズ中は hover 処理をスキップ */
  /* ノード hover = 選択と同じハイライトでプレビュー */
  const ng = ev.target.closest("[data-elem='dev'],[data-elem='seg'],[data-elem='ext']");
  let nid = ng ? ng.dataset.id : null;
  let need = nid !== hoverNode;
  hoverNode = nid;
  /* ライン/セグメント hover はハイライト＋IF/IP ラベルのみ（説明ツールチップは出さない） */
  const lk = ev.target.closest("[data-elem='link'],[data-elem='seglink'],[data-elem='bgpedge'],[data-elem='sedge']");
  const seg = ev.target.closest("[data-elem='seg']");
  if (lk && lk.dataset.elem === "link") {
    const l = DATA.links.find(x=>x.id===lk.dataset.id);
    if (hoverLink !== l.id) { hoverLink = l.id; need = true; }
    if (hoverBgp) { hoverBgp = null; need = true; }
  } else if (lk && lk.dataset.elem === "sedge") {
    /* STATIC 方向線 hover → prefix/nh ラベル表示（hoverLink に se:N を入れる） */
    if (hoverLink !== lk.dataset.id) { hoverLink = lk.dataset.id; need = true; }
    if (hoverBgp) { hoverBgp = null; need = true; }
  } else if ((lk && lk.dataset.elem === "seglink") || seg) {
    const sid = seg ? seg.dataset.id : lk.dataset.id;
    const s = segById(sid);
    /* 楕円（ノード）hover もスポーク hover と同じく IF/IP ラベルを出す（hoverLink=s.id） */
    const want = s ? s.id : sid;
    if (hoverLink !== want) { hoverLink = want; need = true; }
    if (hoverBgp) { hoverBgp = null; need = true; }
  } else if (lk && lk.dataset.elem === "bgpedge") {
    if (hoverLink) { hoverLink = null; need = true; }   /* 直前の物理リンクの IF ラベルが固着しないように */
    if (hoverBgp !== lk.dataset.id) { hoverBgp = lk.dataset.id; need = true; }   /* hover でアドレス表示 */
  } else {
    if (hoverLink) { hoverLink = null; need = true; }
    if (hoverBgp) { hoverBgp = null; need = true; }
  }
  if (need) schedule(render);
});
window.addEventListener("mouseup", () => { canvas.classList.remove("dragging");
  didDrag = !!(drag && drag.moved);   /* mouseup後に発火する click をドラッグ由来か判定するため退避 */

/* click = 選択トグル（複数可・修飾キー不要。もう一度クリックで解除） */
canvas.addEventListener("click", ev => {
  if (didDrag) { didDrag = false; return; }   /* ドラッグ終端の click では選択しない */
  const g = ev.target.closest("[data-elem='dev'],[data-elem='seg'],[data-elem='ext']");
  if (g) {
    const id = g.dataset.id;
    /* セグメント/stub/loopback は subnet そのもの → 楕円クリックも線クリックと同じ「ライン選択」に統一 */
    if (g.dataset.elem === "seg") {
      const s = segById(id);
      if (s) setHotNet(netHot(s.subnet) ? null : s.subnet);
      return;
    }
    if (S.sel.has(id)) S.sel.delete(id); else S.sel.add(id);
    /* 手動で触ったノードは自動選択の追跡から外す（ライン解除での巻き込み防止） */
    autoNetSel.delete(id); autoBgpSel.delete(id);
    update(); return;
  }
  const be = ev.target.closest("[data-elem='bgpedge']");
  if (be) { setHotBgp(be.dataset.id === hotBgp ? null : be.dataset.id); return; }
  /* 全ビュー共通: リンク/セグメント線のクリックで「ライン選択」（図⇄表ハイライト連動） */

       BGP SESSIONS 行と連動させる（曲線・下敷き直線のどちらを押しても同じ挙動） */
    if (le.dataset.elem === "link" && S.view === "bgp") {
      const e = DATA.bgpEdges.find(x => x.kind === "over-link" && x.link === le.dataset.id);
      if (e) { setHotBgp(e.id === hotBgp ? null : e.id); return; }
    }
    const net = le.dataset.elem === "link"
      ? (DATA.links.find(x=>x.id===le.dataset.id) || {}).subnet
      : (segById(le.dataset.id) || {}).subnet;
    if (net) setHotNet(netHot(net) ? null : net);
  }
});
/* dblclick: 空白のみ=全解除（選択・ライン選択・BGP連動・凡例強調をすべてクリア。ノード上の個別解除は廃止） */

/* 表⇄図 ハイライト連動（BGP セッション行 / OSPF 行 / IF 行 / 選択リンクカード） */
document.addEventListener("click", ev => {

/* stub/loopback ノードの安定 id（dev:ifn）。segment 様式ノードとして描画・選択する単位 */
function lpId(st) { return st.dev + ":" + st.ifn; }
/* stub/loopback ノードを id（dev:ifn）で O(1) 引きするための索引（DATA 不変なので一度だけ構築。
   segById が hover/click/applyVisibility のホットパスで線形 find しないため）。 */
const STUB_BY_ID = new Map((DATA.stub_nodes || []).map(st => [lpId(st), st]));
/* DEVICE DETAILS の IF 行用: その (dev, ifn) が現ビューで描画される stub/loopback ノードなら subnet を返す。
   IP2NET には stub の IP が無いため詳細パネルの IF 行へ data-net を付けてクリック選択（setHotNet→netNodes）に乗せる。
   BGP ビューは stub を描画しない・OSPF ビューは area 参加のみ描画＝それ以外は null（選択不可）。 */
function stubNetForDetail(devId, ifn) {
  const st = STUB_BY_ID.get(devId + ":" + ifn);
  if (!st) return null;
  if (S.view === "bgp") return null;
  if (S.view === "ospf" && !st.area) return null;
  return st.subnet;
}
/* stub/loopback ノードがカテゴリトグル（S.filters.lo / S.filters.stub）で非表示か。
   segment の S.filters.seg と対をなす全体表示トグル（visible/selectable 共用）。 */
function stubFiltered(id) {
  const st = STUB_BY_ID.get(id);
  if (!st) return false;
  return (st.kind === "loopback" && !S.filters.lo) || (st.kind === "stub" && !S.filters.stub);
}
/* id が hiddenAS に含まれる AS に属するか（visible/selectable 共用ヘルパ）。
   通常 device・extPeer のほか、stub/loopback ノード（id = dev:ifn）は親 device の AS で判定。 */
function asHidden(id) {
  if (S.filters.hiddenAS.size === 0) return false;
  const d = DATA.devices[id];
  if (d && d.as != null && S.filters.hiddenAS.has(String(d.as))) return true;
  const ep = DATA.extPeers.find(e => e.id === id);
  if (ep && ep.as != null && S.filters.hiddenAS.has(String(ep.as))) return true;
  const st = STUB_BY_ID.get(id);  /* stub/loopback 本体: 親 device の AS で判定 */
  if (st) { const pd = DATA.devices[st.dev];
    if (pd && pd.as != null && S.filters.hiddenAS.has(String(pd.as))) return true; }
  return false;
}
/* id から segment 相当オブジェクトを引く。DATA.segments に無ければ stub_nodes を
   segment 形（members 1件）に正規化して返す（hover/click/詳細パネルで segment ロジックを共用） */
function segById(id) {
  const s = DATA.segments.find(x => x.id === id);
  if (s) return s;
  const st = STUB_BY_ID.get(id);
  if (st) return { id, subnet: st.subnet, area: st.area, kind: st.kind,
                   members: [{ dev: st.dev, ifn: st.ifn, ip: st.ip }] };
  return undefined;
}
/* subnet に接続するノード集合（ライン選択時の端点自動選択用。v6=dual も同一ライン扱い） */
function netNodes(net) {
  const ids = new Set();
  for (const l of DATA.links) if (l.subnet === net || l.dual === net) { ids.add(l.a); ids.add(l.b); }
  for (const s of DATA.segments) if (s.subnet === net) {
    if (S.view !== "bgp") ids.add(s.id);   /* BGP ビューではセグメントノードを描画しないため除外 */
    for (const m of s.members) ids.add(m.dev);
  }
  /* stub/loopback ノードも segment と同様に subnet 連動選択（BGP ビューでは描画しないため除外） */
  for (const st of (DATA.stub_nodes || [])) if (st.subnet === net) {
    if (S.view !== "bgp") ids.add(lpId(st));
    ids.add(st.dev);
  }
  return ids;
}
/* BGP セッションの端点ノード集合 */
/* BGP RR/RRC 役割判定（メモ化・決定的）。
   DATA.bgpEdges を 1 度だけ走査し、rr=true エッジから
   rrFrom（RR 側 device）→ rr 集合、対向端（a/b のうち rrFrom でない方・external は ext）→ rrc 集合 を返す。
   階層 RR では同一 device が rr と rrc の両方に属しうる（両属を許容）。 */
let _bgpRolesCache = null;
function bgpRoles() {
  if (_bgpRolesCache) return _bgpRolesCache;
  const rr = new Set(), rrc = new Set();
  for (const e of DATA.bgpEdges) {
    if (!e.rr || !e.rrFrom) continue;
    rr.add(e.rrFrom);
    /* エッジの両端（external は ext 端、over-link は下敷きリンクから a/b）を求め、
       rrFrom でない側を client とする。over-link は a/b を持たず link 経由で解決する
       （bgpNodes/BGP edge 描画と同一の引き方）。 */
    let ends;
    if (e.kind === "external") ends = [e.a, e.ext];
    else if (e.kind === "over-link") { const l = DATA.links.find(x=>x.id===e.link); ends = l ? [l.a, l.b] : []; }
    else ends = [e.a, e.b];
    for (const n of ends) if (n && n !== e.rrFrom) rrc.add(n);
  }
  _bgpRolesCache = { rr, rrc };
  return _bgpRolesCache;
}

function bgpNodes(id) {
  const ids = new Set();
  const e = DATA.bgpEdges.find(x=>x.id===id);
  if (!e) return ids;
  if (e.kind === "over-link") { const l = DATA.links.find(x=>x.id===e.link); if (l) { ids.add(l.a); ids.add(l.b); } }
  else if (e.kind === "loopback") { ids.add(e.a); ids.add(e.b); }
  else { ids.add(e.a); ids.add(e.ext); }
  return ids;
}
/* ライン選択での「自動選択分」を手動選択と区別して追跡する
   （解除・切替時に自動選択分だけを外し、手動選択を巻き込まないため） */
let autoNetSel = new Set(), autoBgpSel = new Set();
/* 自動選択の対象にしてよいノードか（非表示ノードを選択に混ぜると図とパネルが乖離する） */
function selectable(id) {
  if (S.hiddenNodes.has(id)) return false;
  if (DATA.segments.some(s=>s.id===id) && !S.filters.seg) return false;
  if (stubFiltered(id)) return false;        /* loopback/stub のカテゴリ全体トグル */
  if (asHidden(id)) return false;
  return true;
}
/* ライン選択（subnet 単位）。端点ノードも自動選択し、図と表を同時に再描画 */
function setHotNet(net) {
  /* 解除するノードを、アクティブな BGP セッション選択がまだ必要としているなら追跡を付け替えて選択維持 */
  const keep = hotBgp ? bgpNodes(hotBgp) : null;
  for (const id of autoNetSel) {
    if (keep && keep.has(id)) autoBgpSel.add(id);
    else S.sel.delete(id);
  }
  autoNetSel = new Set();
  hotNet = net;
  if (net) for (const id of netNodes(net))
    if (selectable(id) && !S.sel.has(id)) { S.sel.add(id); autoNetSel.add(id); }
  update();
}
/* BGP セッション選択。端点ノードも自動選択し、図と表（bgprow の hot）を同時に再描画 */
function setHotBgp(id) {
  const keep = hotNet ? netNodes(hotNet) : null;
  for (const n of autoBgpSel) {
    if (keep && keep.has(n)) autoNetSel.add(n);
    else S.sel.delete(n);
  }
  autoBgpSel = new Set();
  hotBgp = id;
  if (id) for (const n of bgpNodes(id))
    if (selectable(n) && !S.sel.has(n)) { S.sel.add(n); autoBgpSel.add(n); }
  update();
}

/* tooltip（ライン/セグメント hover の説明表示は廃止。#tooltip はリサイズガードの hideTip でのみ参照） */

/* zoom */
canvas.addEventListener("wheel", ev => {
  ev.preventDefault();
  const r = canvas.getBoundingClientRect();
  const mx = ev.clientX - r.left, my = ev.clientY - r.top;
  const f = ev.deltaY < 0 ? 1.12 : 1/1.12;
  const k2 = Math.min(4, Math.max(.25, S.k * f));
  S.tx = mx - (mx - S.tx) * (k2/S.k); S.ty = my - (my - S.ty) * (k2/S.k); S.k = k2;
  schedule(applyTransform);
}, {passive:false});
function zoomFit() {
  const xs = Object.values(POS).map(p=>p.x), ys = Object.values(POS).map(p=>p.y);
  const pad = 140;
  const bx = Math.min(...xs)-pad, by = Math.min(...ys)-pad;
  const bw = Math.max(...xs)-bx+pad, bh = Math.max(...ys)-by+pad;
  const r = canvas.getBoundingClientRect();
  S.k = Math.min(r.width/bw, r.height/bh, 2);
  S.tx = (r.width - bw*S.k)/2 - bx*S.k; S.ty = (r.height - bh*S.k)/2 - by*S.k;
  applyTransform();
}
function zoomReset() { S.k = 1; S.tx = 0; S.ty = 0; applyTransform(); }
$("#zin").onclick = () => { S.k = Math.min(4, S.k*1.25); applyTransform(); };
$("#zout").onclick = () => { S.k = Math.max(.25, S.k/1.25); applyTransform(); };
$("#zfit").onclick = zoomFit;
$("#zreset").onclick = zoomReset;

function setView(v) {
  if (v === S.view) return;   /* 同一ビューの再指定でライン選択等をリセットしない */
  S.view = v;
  document.querySelectorAll("#tabs button").forEach(b => b.classList.toggle("active", b.dataset.view === v));
  /* ライン選択はタブ固有の文脈なので解除（自動選択した端点ノードも一緒に外す） */
  for (const id of autoNetSel) S.sel.delete(id);
  for (const id of autoBgpSel) S.sel.delete(id);
  autoNetSel = new Set(); autoBgpSel = new Set();
  hotNet = null;
  hotBgp = null;
  S.legendHot = null;   /* 凡例強調はビュー固有の項目を含むためリセット */
  /* ビューに描画されないノードが選択に残ると図とパネルが乖離するため除外 */
  if (v === "bgp") for (const s of DATA.segments) S.sel.delete(s.id);
  if (v === "ospf") for (const s of DATA.segments) if (!s.area) S.sel.delete(s.id);
  if (v === "bgp") for (const st of (DATA.stub_nodes || [])) S.sel.delete(lpId(st));
  if (v === "ospf") for (const st of (DATA.stub_nodes || [])) if (!st.area) S.sel.delete(lpId(st));
  /* 表ビューは何も描画しないビューなので選択は据え置く（BGP→表→BGP の往復で消えないように） */
  if (v !== "bgp" && !(v === "addr" || v === "ifs")) for (const e of DATA.extPeers) S.sel.delete(e.id);
  /* ビュー切替でASパネルが開いたまま残らないよう閉じる */
  const _am = $("#as-menu"); if (_am) _am.classList.remove("open");

}

/* search（テキスト入力とフィールドドロップダウンの両方から呼ぶ） */
function applySearch() {
  const q = searchQuery();
  S.matches = !S.search ? []
    : q.field ? (q.value ? Object.keys(fcorpus).filter(id => (fcorpus[id][q.field] || "").includes(q.value)) : [])
    : Object.keys(corpus).filter(id => corpus[id].includes(S.search));
  S.mi = -1;
  graphSearchFeedback();   /* 表ビュー中は直後の render → renderTableView が行数基準で上書きする */
  render();
}
$("#search").addEventListener("input", ev => {
  S.search = ev.target.value.trim().toLowerCase();
  applySearch();
});
$("#sfield").addEventListener("change", ev => {
  S.sfield = ev.target.value;
  applySearch();
});
$("#search").addEventListener("keydown", ev => {
  /* 検索欄フォーカス中の Ctrl+F も全選択に（末尾の stopPropagation で window 側へ届かないためここで処理） */
  if ((ev.ctrlKey || ev.metaKey) && (ev.key === "f" || ev.key === "F")) {
    ev.preventDefault(); ev.target.select(); ev.stopPropagation(); return;
  }
  if (ev.key === "Enter" && S.matches.length) {
    if (isTableView()) return;   /* 表ビューでは Enter 巡回（図のパン）は行わない */
    /* 非表示ノードは巡回スキップ（件数には含める＝隠したノードの存在は検索で分かる） */
    const cyc = S.matches.filter(id => !S.hiddenNodes.has(id));
    if (!cyc.length) return;
    S.mi = (S.mi + 1) % cyc.length;
    const id = cyc[S.mi];
    const r = canvas.getBoundingClientRect();
    S.tx = r.width/2 - POS[id].x * S.k; S.ty = r.height/2 - POS[id].y * S.k;
    render();
  }
  if (ev.key === "Escape") { ev.target.value = ""; ev.target.dispatchEvent(new Event("input")); ev.target.blur(); }
  ev.stopPropagation();
});

if (asList.length > 0 && asMenuBtn && asMenuPanel && asMenuList) {

  const deviceAS = new Set(Object.values(DATA.devices).filter(d => d.as != null).map(d => +d.as));

    lbl.appendChild(cb);
    lbl.appendChild(sw);
    const label = deviceAS.has(asn) ? "AS "+asn : "AS "+asn+" (外部)";
    lbl.appendChild(document.createTextNode(label));
    cb.addEventListener("change", e => {
      const a = e.target.dataset.fas;
      if (e.target.checked) S.filters.hiddenAS.delete(a);
      else S.filters.hiddenAS.add(a);

    });
    asMenuList.appendChild(lbl);
  });
  /* ボタンクリックでパネル開閉 */
  asMenuBtn.addEventListener("click", e => {

  });

    render();
  });
  /* 全非表示: 全 AS を hiddenAS に追加して全チェックボックスを unchecked に */
  $("#as-hide-all").addEventListener("click", () => {
    asList.forEach(asn => S.filters.hiddenAS.add(String(asn)));
    asMenuList.querySelectorAll("input[data-fas]").forEach(cb => { cb.checked = false; });
    render();
  });
  /* パネル外クリックで閉じる */
  document.addEventListener("click", e => {
    if (asMenuPanel.classList.contains("open") && !asMenuPanel.contains(e.target) && e.target !== asMenuBtn) {
      asMenuPanel.classList.remove("open");
    }
  });
} else if (asMenuBtn) {

}

/* 表示ノード指定パネル: ノード単位で表示/非表示を指定 */
function renderNodePanel() {
  const np = $("#nodepanel");
  np.style.display = S.nodePanel ? "block" : "none";
  if (!S.nodePanel) return;
  const row = (id, label, type) =>
    `<label><input type="checkbox" data-nid="${esc(id)}" ${S.hiddenNodes.has(id)?"":"checked"}> ${esc(label)}<span class="ntype">${type}</span></label>`;
  np.innerHTML = `<h4>表示するノード</h4>`
    + Object.entries(DATA.devices).map(([id,d]) => row(id, d.hostname, "機器")).join("")
    + DATA.segments.map(s => row(s.id, s.subnet, "seg")).join("")
    + (DATA.stub_nodes || []).map(st => row(lpId(st), st.ifn + " (" + st.ip + ")", st.kind === "loopback" ? "loopback" : "stub")).join("")
    + DATA.extPeers.map(e => row(e.id, e.label, "ext")).join("");
}
$("#nodepanel").addEventListener("change", ev => {
  const id = ev.target.dataset.nid; if (!id) return;
  if (ev.target.checked) S.hiddenNodes.delete(id);
  else { S.hiddenNodes.add(id); S.sel.delete(id); }   /* 非表示にしたノードは選択からも外す（図とパネルの乖離防止） */
  update();
});
$("#btn-nodes").onclick = function() {
  S.nodePanel = !S.nodePanel;
  this.classList.toggle("on", S.nodePanel);
  renderNodePanel();
};
$("#btn-minimap").onclick = function() { S.minimap = !S.minimap; this.classList.toggle("on", S.minimap); renderMinimap(); };
$("#btn-legend").onclick = function() { S.legend = !S.legend; this.classList.toggle("on", S.legend); renderLegend(); };
$("#btn-theme").onclick = () => {
  const h = document.documentElement;
  h.dataset.theme = h.dataset.theme === "dark" ? "light" : "dark";
};

/* エクスポート: 現在の表示状態（配置・ハイライト込み）を SVG / PNG で保存 */
const SVG_VARS = ["--bg","--bg-dot","--panel","--panel-edge","--panel-glow","--ink","--ink-dim","--ink-faint",
  "--accent","--search","--danger","--node-fill","--node-edge","--node-ink","--link","--link-dim","--seg-fill",
  "--lp-edge","--lp-fill","--stub-edge","--stub-fill"];
function svgSnapshot() {
  const r = canvas.getBoundingClientRect();
  const clone = canvas.cloneNode(true);
  clone.setAttribute("xmlns", _SVG_NS);
  clone.setAttribute("width", r.width); clone.setAttribute("height", r.height);
  /* スタンドアロン SVG では html 側の CSS 変数が届かないため、現テーマの値をルートにインライン展開する */
  const cs = getComputedStyle(document.documentElement);
  /* 末尾の width/height は埋め込み CSS の #canvas{width:100%...} に属性が負けないための上書き */
  clone.setAttribute("style", SVG_VARS.map(v => `${v}:${cs.getPropertyValue(v).trim()}`).join(";")
    + `;width:${r.width}px;height:${r.height}px`);
  const ns = _SVG_NS;
  const st = document.createElementNS(ns, "style");
  st.textContent = document.querySelector("style").textContent;
  clone.insertBefore(st, clone.firstChild);
  const bg = document.createElementNS(ns, "rect");
  bg.setAttribute("width", "100%"); bg.setAttribute("height", "100%");
  bg.setAttribute("fill", cs.getPropertyValue("--bg").trim());
  clone.insertBefore(bg, st.nextSibling);
  return { src: new XMLSerializer().serializeToString(clone), w: r.width, h: r.height };
}
function downloadBlob(blob, name) {
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob); a.download = name; a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 5000);
}
$("#exp-svg").onclick = () => {
  const s = svgSnapshot();
  downloadBlob(new Blob([s.src], {type:"image/svg+xml"}), "topology.svg");
};
$("#exp-png").onclick = () => {
  const s = svgSnapshot();
  const img = new Image();
  img.onload = () => {
    const c = document.createElement("canvas");
    c.width = s.w * 2; c.height = s.h * 2;   /* 2x で書き出し（報告書貼付向け） */
    const x = c.getContext("2d");
    x.scale(2, 2); x.drawImage(img, 0, 0, s.w, s.h);
    c.toBlob(b => { if (b) downloadBlob(b, "topology.png"); }, "image/png");
  };
  img.onerror = () => { downloadBlob(new Blob([s.src], {type:"image/svg+xml"}), "topology.svg"); };  /* PNG 不可なら SVG で代替 */
  img.src = "data:image/svg+xml;charset=utf-8," + encodeURIComponent(s.src);
};

/* 詳細パネル: リサイズ & 最小化 */
const detailsEl = $("#details");
let rs = null;
$("#resizer").addEventListener("mousedown", ev => {
  rs = { x: ev.clientX, w: detailsEl.getBoundingClientRect().width };
  ev.preventDefault();
});
window.addEventListener("mousemove", ev => {
  if (!rs) return;
  detailsEl.classList.remove("min");
  $("#btn-panelmin").textContent = "—";
  detailsEl.style.width = Math.min(560, Math.max(220, rs.w + (rs.x - ev.clientX))) + "px";
});
window.addEventListener("mouseup", () => { rs = null; });
$("#btn-panelmin").onclick = function() {
  const min = detailsEl.classList.toggle("min");
  this.textContent = min ? "❮" : "—";
};

/* keyboard — B5 キーボードショートカット拡充 */
/* keyToAction: DOM 非依存の純関数。新規ショートカットキーをアクション名に変換する。
   既存予約キー (f/F/Escape///数字/Ctrl+F) は別処理のため null を返す（マップに含めない）。
   大文字小文字は toLowerCase() で正規化する。*/
function keyToAction(key) {
  const M = {"g":"connected","h":"focus","m":"minimap","l":"legend","?":"shortcuts"};
  return M[String(key).toLowerCase()] || null;
}
/* toggleShortcutsOverlay: shortcuts-overlay の表示/非表示をトグルする。
   オーバーレイ自身のクリックでも閉じる（onclick はオーバーレイ要素に設定済み）。 */
function toggleShortcutsOverlay() {
  $("#shortcuts-overlay").classList.toggle("visible");
}

window.addEventListener("keydown", ev => {
  /* Ctrl+F / ⌘F はどこにフォーカスがあっても検索欄へ（ブラウザのページ内検索を抑止） */
  if ((ev.ctrlKey || ev.metaKey) && (ev.key === "f" || ev.key === "F")) {
    ev.preventDefault();
    const si = $("#search"); si.focus(); si.select();
    return;
  }
  /* Escape のみ: INPUT等にフォーカス中でも AS パネルが開いていれば閉じる（他キーの INPUT ガードは下の行で維持） */
  if (ev.key === "Escape") { const _am2 = $("#as-menu"); if (_am2 && _am2.classList.contains("open")) { _am2.classList.remove("open"); return; } }
  if (/^(INPUT|SELECT|TEXTAREA)$/.test(ev.target.tagName) || ev.target.isContentEditable) return;
  if (ev.key === "f" || ev.key === "F") zoomFit();
  else if (ev.key === "Escape") { $("#shortcuts-overlay").classList.remove("visible"); const _am = $("#as-menu"); if (_am) _am.classList.remove("open"); S.sel.clear(); hotBgp = null; hotNet = null; S.legendHot = null; autoNetSel = new Set(); autoBgpSel = new Set(); zoomReset(); update(); }
  else if (ev.key === "/") { ev.preventDefault(); const si = $("#search"); si.focus(); si.select(); }
  else if (/^\d$/.test(ev.key)) {
    const _vi = +ev.key - 1;
    if (_vi >= 0 && _vi < VIEWS.length) setView(VIEWS[_vi]);
  }
  else {
    const _act = keyToAction(ev.key);
    if (_act === "shortcuts") toggleShortcutsOverlay();
    else if (_act && !isTableView()) $("#btn-" + _act).click();  /* 既存ボタンの onclick を発火（状態ロジック非二重化）。表ビュー中はグラフ操作系をスキップ */
  }
});

/* ================= boot ================= */
function update() {
  /* 凡例強調はビュー変更で項目が消えたら無効化（全画面 dim の固着防止） */
  if (S.legendHot) {
    const lg = S.legendHot;
    if (((lg === "ebgp" || lg === "ibgp" || lg.startsWith("as:")) && S.view !== "bgp") || (lg.startsWith("area:") && S.view !== "ospf") || ((lg === "loopback" || lg === "stub" || lg === "admin-down") && S.view === "bgp")) S.legendHot = null;
  }
  render(); renderDetails(); renderLegend();
  syncHashToState();  /* URL ハッシュを現在の view+sel に同期（B3） */
}
$("#btn-minimap").classList.add("on");
$("#btn-legend").classList.add("on");
$("#btn-focus").classList.add("on");
/* shortcuts-overlay: オーバーレイ自身（背景）をクリックで閉じる */
$("#shortcuts-overlay").addEventListener("click", function(ev) {
  if (ev.target === this) this.classList.remove("visible");
});
renderStatus();
applyStateFromHash();  /* URL ハッシュから view+sel を復元してから初期描画（B3） */
update();
zoomFit();
window.addEventListener("resize", () => schedule(render));

</script></body></html>
