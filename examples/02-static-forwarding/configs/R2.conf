## Juniper JunOS configuration in `set` format
## Scenario 02 static-forwarding : R2
set system host-name R2
set interfaces ge-0/0/0 description to-R1
set interfaces ge-0/0/0 unit 0 family inet address 10.0.12.2/24
set interfaces ge-0/0/1 description exit-interface-link
set interfaces ge-0/0/1 unit 0 family inet address 10.0.13.2/24
set interfaces lo0 unit 0 family inet address 2.2.2.2/32
set protocols ospf area 0 interface lo0.0
## --- static routes ---
## normal next-hop
set routing-options static route 172.16.0.0/16 next-hop 10.0.12.1
## blackhole (discard)
set routing-options static route 172.17.0.0/16 discard
## blackhole (reject)
set routing-options static route 172.18.0.0/16 reject
## ECMP via two qualified-next-hop (both resolvable: 10.0.12.1 and 10.0.13.1)
set routing-options static route 172.19.0.0/16 qualified-next-hop 10.0.12.1
set routing-options static route 172.19.0.0/16 qualified-next-hop 10.0.13.1
## default route
set routing-options static route 0.0.0.0/0 next-hop 10.0.12.1
