!
! Cisco IOS / IOS-XE running-config
! Scenario 02 static-forwarding : R1
!
hostname R1
!
interface GigabitEthernet0/0
 description to-R2
 ip address 10.0.12.1 255.255.255.0
 no shutdown
!
interface GigabitEthernet0/1
 description exit-interface-link
 ip address 10.0.13.1 255.255.255.0
 no shutdown
!
interface Loopback0
 ip address 1.1.1.1 255.255.255.255
!
router ospf 1
 network 1.1.1.1 0.0.0.0 area 0
!
! --- static routes (variety) ---
! normal next-hop IP
ip route 10.10.0.0 255.255.0.0 10.0.12.2
! exit-interface (IF form)
ip route 10.20.0.0 255.255.0.0 GigabitEthernet0/1
! IF + next-hop IP together
ip route 10.30.0.0 255.255.0.0 GigabitEthernet0/0 10.0.12.2
! blackhole (Null0)
ip route 10.40.0.0 255.255.0.0 Null0
! AD + name (must be separated / ignored)
ip route 10.50.0.0 255.255.0.0 10.0.12.2 200 name BACKUP
! default route
ip route 0.0.0.0 0.0.0.0 10.0.12.2
!
end
