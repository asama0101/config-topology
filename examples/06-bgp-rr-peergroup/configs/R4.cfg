!
! Cisco IOS running-config - R4 (iBGP client, AS 65001)
!
! R4 peers ONLY with the hub R1 via a peer-group (CLIENTS) that inherits
! remote-as / update-source / send-community / timers from the group template.
! It does not peer R2 or R3 -> contributes to the incomplete iBGP mesh.
!
hostname R4
!
interface Loopback0
 description RID-AND-IBGP-SOURCE
 ip address 10.255.0.4 255.255.255.255
!
interface GigabitEthernet0/0
 description P2P-to-R1
 ip address 10.0.14.4 255.255.255.0
 no shutdown
!
router ospf 1
 router-id 10.255.0.4
 network 10.255.0.4 0.0.0.0 area 0
 network 10.0.14.0 0.0.0.255 area 0
!
router bgp 65001
 bgp router-id 10.255.0.4
 neighbor CLIENTS peer-group
 neighbor CLIENTS remote-as 65001
 neighbor CLIENTS update-source Loopback0
 neighbor CLIENTS send-community both
 neighbor CLIENTS timers 10 30
 neighbor 10.255.0.1 peer-group CLIENTS
!
end
