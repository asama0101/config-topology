!
! Cisco IOS running-config - R3 (iBGP client, AS 65001)
!
! R3 peers ONLY with the hub R1 using an individual neighbor statement
! (demonstrates update-source / send-community / timers WITHOUT a peer-group).
! It does not peer R2 or R4 -> contributes to the incomplete iBGP mesh.
!
hostname R3
!
interface Loopback0
 description RID-AND-IBGP-SOURCE
 ip address 10.255.0.3 255.255.255.255
!
interface GigabitEthernet0/0
 description P2P-to-R1
 ip address 10.0.13.3 255.255.255.0
 no shutdown
!
router ospf 1
 router-id 10.255.0.3
 network 10.255.0.3 0.0.0.0 area 0
 network 10.0.13.0 0.0.0.255 area 0
!
router bgp 65001
 bgp router-id 10.255.0.3
 neighbor 10.255.0.1 remote-as 65001
 neighbor 10.255.0.1 update-source Loopback0
 neighbor 10.255.0.1 send-community standard
 neighbor 10.255.0.1 timers 10 30
!
end
