!
! Cisco IOS running-config - R1 (intended Route Reflector, AS 65001)
!
! Scenario: R1 is the iBGP Route Reflector (RR) for AS 65001 and peers
! R2/R3/R4 (RR clients / RRC) via a peer-group (CLIENTS) using loopback
! update-source. The peer-group carries "neighbor CLIENTS
! route-reflector-client", so R1 reflects routes between its clients and the
! iBGP mesh is logically complete. This is a correct RR configuration
! (R1 = RR, R2/R3/R4 = RRC); config-topology does NOT fire
! ibgp_fullmesh_incomplete for this AS.
!
hostname R1
!
interface Loopback0
 description RID-AND-IBGP-SOURCE
 ip address 10.255.0.1 255.255.255.255
!
interface GigabitEthernet0/0
 description P2P-to-R2
 ip address 10.0.12.1 255.255.255.0
 no shutdown
!
interface GigabitEthernet0/1
 description P2P-to-R3
 ip address 10.0.13.1 255.255.255.0
 no shutdown
!
interface GigabitEthernet0/2
 description P2P-to-R4
 ip address 10.0.14.1 255.255.255.0
 no shutdown
!
router ospf 1
 router-id 10.255.0.1
 network 10.255.0.1 0.0.0.0 area 0
 network 10.0.12.0 0.0.0.255 area 0
 network 10.0.13.0 0.0.0.255 area 0
 network 10.0.14.0 0.0.0.255 area 0
!
router bgp 65001
 bgp router-id 10.255.0.1
 neighbor CLIENTS peer-group
 neighbor CLIENTS remote-as 65001
 neighbor CLIENTS update-source Loopback0
 neighbor CLIENTS send-community both
 neighbor CLIENTS timers 10 30
 neighbor CLIENTS route-reflector-client
 neighbor 10.255.0.2 peer-group CLIENTS
 neighbor 10.255.0.3 peer-group CLIENTS
 neighbor 10.255.0.4 peer-group CLIENTS
!
end
