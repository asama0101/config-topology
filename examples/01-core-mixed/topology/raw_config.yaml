raw_configs:
  r1: "!\n! Cisco IOS running-config - R1 (core, IOS)\n!\nhostname R1\n!\ninterface\
    \ Loopback0\n description ROUTER-ID-LOOPBACK\n ip address 1.1.1.1 255.255.255.255\n\
    !\ninterface GigabitEthernet0/0\n description P2P-to-R2 (dual-stack)\n ip address\
    \ 10.0.12.1 255.255.255.0\n ipv6 address 2001:DB8:12::1/64\n no shutdown\n!\n\
    interface GigabitEthernet0/1\n description SEG-to-R3-R4 10.0.100.0/24\n ip address\
    \ 10.0.100.1 255.255.255.0\n no shutdown\n!\nrouter ospf 1\n network 1.1.1.1 0.0.0.0\
    \ area 0\n network 10.0.12.0 0.0.0.255 area 0\n network 10.0.100.0 0.0.0.255 area\
    \ 0\n!\nrouter bgp 65001\n bgp router-id 1.1.1.1\n neighbor 2.2.2.2 remote-as\
    \ 65001\n neighbor 2.2.2.2 update-source Loopback0\n!\nend\n"
  r2: '## Juniper JunOS configuration in set format - R2 (core, JunOS, iBGP+eBGP)

    set system host-name R2

    set interfaces lo0 unit 0 family inet address 2.2.2.2/32

    set interfaces ge-0/0/0 description P2P-to-R1-dual-stack

    set interfaces ge-0/0/0 unit 0 family inet address 10.0.12.2/24

    set interfaces ge-0/0/0 unit 0 family inet6 address 2001:db8:12::2/64

    set interfaces ge-0/0/1 description P2P-to-R3

    set interfaces ge-0/0/1 unit 0 family inet address 10.0.23.2/24

    set routing-options autonomous-system 65001

    set routing-options router-id 2.2.2.2

    set protocols ospf area 0 interface lo0.0

    set protocols ospf area 0 interface ge-0/0/0.0

    set protocols ospf area 0 interface ge-0/0/1.0

    set protocols bgp group ibgp type internal

    set protocols bgp group ibgp neighbor 1.1.1.1 peer-as 65001

    set protocols bgp group ibgp neighbor 1.1.1.1 local-address 2.2.2.2

    set protocols bgp group ibgp neighbor 4.4.4.4 peer-as 65001

    set protocols bgp group ibgp neighbor 4.4.4.4 local-address 2.2.2.2

    set protocols bgp group ext type external

    set protocols bgp group ext neighbor 10.0.23.3 peer-as 65002

    '
  r3: "!\n! Cisco IOS running-config - R3 (edge, IOS, eBGP to R2)\n!\nhostname R3\n\
    !\ninterface Loopback0\n description ROUTER-ID-LOOPBACK\n ip address 3.3.3.3 255.255.255.255\n\
    !\ninterface GigabitEthernet0/0\n description P2P-to-R2\n ip address 10.0.23.3\
    \ 255.255.255.0\n no shutdown\n!\ninterface GigabitEthernet0/1\n description SEG-to-R1-R4\
    \ 10.0.100.0/24\n ip address 10.0.100.3 255.255.255.0\n no shutdown\n!\nrouter\
    \ ospf 1\n network 3.3.3.3 0.0.0.0 area 0\n network 10.0.23.0 0.0.0.255 area 0\n\
    \ network 10.0.100.0 0.0.0.255 area 0\n!\nrouter bgp 65002\n bgp router-id 3.3.3.3\n\
    \ neighbor 10.0.23.2 remote-as 65001\n!\nend\n"
  r4: '## Juniper JunOS configuration in set format - R4 (access, JunOS, iBGP)

    set system host-name R4

    set interfaces lo0 unit 0 family inet address 4.4.4.4/32

    set interfaces ge-0/0/0 description SEG-to-R1-R3 10.0.100.0/24

    set interfaces ge-0/0/0 unit 0 family inet address 10.0.100.4/24

    set routing-options autonomous-system 65001

    set routing-options router-id 4.4.4.4

    set protocols ospf area 0 interface lo0.0

    set protocols ospf area 0 interface ge-0/0/0.0

    set protocols bgp group ibgp type internal

    set protocols bgp group ibgp neighbor 2.2.2.2 peer-as 65001

    set protocols bgp group ibgp neighbor 2.2.2.2 local-address 4.4.4.4

    '
