!
! Cisco IOS / IOS-XE running-config (VRF demo: R1)
!
hostname R1
!
ip vrf RED
!
interface GigabitEthernet0/0
 description to-R2-global
 ip address 10.0.12.1 255.255.255.0
 no shutdown
!
interface GigabitEthernet0/1
 description CUST-RED-link
 ip vrf forwarding RED
 ip address 10.5.5.1 255.255.255.0
 no shutdown
!
interface GigabitEthernet0/2
 description GLOBAL-overlap-link
 ip address 10.5.5.1 255.255.255.0
 no shutdown
!
interface Loopback0
 ip address 1.1.1.1 255.255.255.255
!
router bgp 65020
 neighbor 10.0.12.2 remote-as 65002
 address-family ipv4 vrf RED
  neighbor 10.5.5.2 remote-as 65010
 exit-address-family
!
ip route vrf RED 192.168.50.0 255.255.255.0 10.5.5.2
!
end
