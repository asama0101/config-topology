!
! Cisco IOS running-config - R3 (AFTER snapshot)
!
hostname R3
!
interface Loopback0
 description ROUTER-ID-LOOPBACK
 ip address 3.3.3.3 255.255.255.255
!
interface GigabitEthernet0/0
 description P2P-to-R2
 ip address 10.0.23.3 255.255.255.0
 no shutdown
!
interface GigabitEthernet0/1
 description P2P-to-R1 (new direct link)
 ip address 10.0.13.3 255.255.255.0
 no shutdown
!
router ospf 1
 network 3.3.3.3 0.0.0.0 area 0
 network 10.0.23.0 0.0.0.255 area 1
 network 10.0.13.0 0.0.0.255 area 0
!
router bgp 65002
 bgp router-id 3.3.3.3
 neighbor 10.0.23.2 remote-as 65001
 neighbor 10.0.13.1 remote-as 65001
!
end
