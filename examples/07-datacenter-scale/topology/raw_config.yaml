raw_configs:
  core1: "!\n! AS 65000 backbone core1 (Cisco IOS)\n!\nhostname core1\n!\ninterface\
    \ Loopback0\n ip address 10.255.0.1 255.255.255.255\n!\ninterface GigabitEthernet0/0\n\
    \ description to-core2\n ip address 10.0.0.1 255.255.255.252\n no shutdown\n!\n\
    interface GigabitEthernet0/1\n description to-spine1\n ip address 10.0.1.1 255.255.255.252\n\
    \ no shutdown\n!\ninterface GigabitEthernet0/2\n description to-spine3\n ip address\
    \ 10.0.2.1 255.255.255.252\n no shutdown\n!\nrouter bgp 65000\n neighbor 10.0.0.2\
    \ remote-as 65000\n neighbor 10.0.1.2 remote-as 65001\n neighbor 10.0.2.2 remote-as\
    \ 65002\n!\nend\n"
  core2: "!\n! AS 65000 backbone core2 (Cisco IOS)\n!\nhostname core2\n!\ninterface\
    \ Loopback0\n ip address 10.255.0.2 255.255.255.255\n!\ninterface GigabitEthernet0/0\n\
    \ description to-core1\n ip address 10.0.0.2 255.255.255.252\n no shutdown\n!\n\
    interface GigabitEthernet0/1\n description to-spine2\n ip address 10.0.3.1 255.255.255.252\n\
    \ no shutdown\n!\ninterface GigabitEthernet0/2\n description to-spine4\n ip address\
    \ 10.0.4.1 255.255.255.252\n no shutdown\n!\nrouter bgp 65000\n neighbor 10.0.0.1\
    \ remote-as 65000\n neighbor 10.0.3.2 remote-as 65001\n neighbor 10.0.4.2 remote-as\
    \ 65002\n!\nend\n"
  leaf1: "!\n! AS 65001 pod1 leaf1 (Cisco IOS)\n!\nhostname leaf1\n!\ninterface Loopback0\n\
    \ ip address 10.255.1.11 255.255.255.255\n!\ninterface GigabitEthernet0/0\n description\
    \ to-spine1\n ip address 10.1.1.2 255.255.255.252\n no shutdown\n!\ninterface\
    \ GigabitEthernet0/1\n description to-spine2\n ip address 10.1.3.2 255.255.255.252\n\
    \ no shutdown\n!\ninterface GigabitEthernet0/2\n description server-lan\n ip address\
    \ 192.168.11.1 255.255.255.0\n no shutdown\n!\nrouter bgp 65001\n neighbor 10.1.1.1\
    \ remote-as 65001\n neighbor 10.1.3.1 remote-as 65001\n!\nend\n"
  leaf2: '## AS 65001 pod1 leaf2 (Juniper JunOS, set format)

    set system host-name leaf2

    set interfaces lo0 unit 0 family inet address 10.255.1.12/32

    set interfaces ge-0/0/0 description to-spine1

    set interfaces ge-0/0/0 unit 0 family inet address 10.1.2.2/30

    set interfaces ge-0/0/1 description to-spine2

    set interfaces ge-0/0/1 unit 0 family inet address 10.1.4.2/30

    set interfaces ge-0/0/2 description server-lan

    set interfaces ge-0/0/2 unit 0 family inet address 192.168.12.1/24

    set routing-options autonomous-system 65001

    set protocols bgp group ibgp type internal

    set protocols bgp group ibgp neighbor 10.1.2.1 peer-as 65001

    set protocols bgp group ibgp neighbor 10.1.4.1 peer-as 65001

    '
  leaf3: "!\n! AS 65002 pod2 leaf3 (Cisco IOS)\n!\nhostname leaf3\n!\ninterface Loopback0\n\
    \ ip address 10.255.2.11 255.255.255.255\n!\ninterface GigabitEthernet0/0\n description\
    \ to-spine3\n ip address 10.2.1.2 255.255.255.252\n no shutdown\n!\ninterface\
    \ GigabitEthernet0/1\n description to-spine4\n ip address 10.2.3.2 255.255.255.252\n\
    \ no shutdown\n!\ninterface GigabitEthernet0/2\n description server-lan\n ip address\
    \ 192.168.13.1 255.255.255.0\n no shutdown\n!\nrouter bgp 65002\n neighbor 10.2.1.1\
    \ remote-as 65002\n neighbor 10.2.3.1 remote-as 65002\n!\nend\n"
  leaf4: '## AS 65002 pod2 leaf4 (Juniper JunOS, set format)

    set system host-name leaf4

    set interfaces lo0 unit 0 family inet address 10.255.2.12/32

    set interfaces ge-0/0/0 description to-spine3

    set interfaces ge-0/0/0 unit 0 family inet address 10.2.2.2/30

    set interfaces ge-0/0/1 description to-spine4

    set interfaces ge-0/0/1 unit 0 family inet address 10.2.4.2/30

    set interfaces ge-0/0/2 description server-lan

    set interfaces ge-0/0/2 unit 0 family inet address 192.168.14.1/24

    set routing-options autonomous-system 65002

    set protocols bgp group ibgp type internal

    set protocols bgp group ibgp neighbor 10.2.2.1 peer-as 65002

    set protocols bgp group ibgp neighbor 10.2.4.1 peer-as 65002

    '
  spine1: "!\n! AS 65001 pod1 spine1 (Cisco IOS)\n!\nhostname spine1\n!\ninterface\
    \ Loopback0\n ip address 10.255.1.1 255.255.255.255\n!\ninterface GigabitEthernet0/0\n\
    \ description to-core1\n ip address 10.0.1.2 255.255.255.252\n no shutdown\n!\n\
    interface GigabitEthernet0/1\n description to-leaf1\n ip address 10.1.1.1 255.255.255.252\n\
    \ no shutdown\n!\ninterface GigabitEthernet0/2\n description to-leaf2\n ip address\
    \ 10.1.2.1 255.255.255.252\n no shutdown\n!\nrouter bgp 65001\n neighbor 10.0.1.1\
    \ remote-as 65000\n neighbor 10.1.1.2 remote-as 65001\n neighbor 10.1.2.2 remote-as\
    \ 65001\n!\nend\n"
  spine2: '## AS 65001 pod1 spine2 (Juniper JunOS, set format)

    set system host-name spine2

    set interfaces lo0 unit 0 family inet address 10.255.1.2/32

    set interfaces ge-0/0/0 description to-core2

    set interfaces ge-0/0/0 unit 0 family inet address 10.0.3.2/30

    set interfaces ge-0/0/1 description to-leaf1

    set interfaces ge-0/0/1 unit 0 family inet address 10.1.3.1/30

    set interfaces ge-0/0/2 description to-leaf2

    set interfaces ge-0/0/2 unit 0 family inet address 10.1.4.1/30

    set routing-options autonomous-system 65001

    set protocols bgp group ext type external

    set protocols bgp group ext neighbor 10.0.3.1 peer-as 65000

    set protocols bgp group ibgp type internal

    set protocols bgp group ibgp neighbor 10.1.3.2 peer-as 65001

    set protocols bgp group ibgp neighbor 10.1.4.2 peer-as 65001

    '
  spine3: "!\n! AS 65002 pod2 spine3 (Cisco IOS)\n!\nhostname spine3\n!\ninterface\
    \ Loopback0\n ip address 10.255.2.1 255.255.255.255\n!\ninterface GigabitEthernet0/0\n\
    \ description to-core1\n ip address 10.0.2.2 255.255.255.252\n no shutdown\n!\n\
    interface GigabitEthernet0/1\n description to-leaf3\n ip address 10.2.1.1 255.255.255.252\n\
    \ no shutdown\n!\ninterface GigabitEthernet0/2\n description to-leaf4\n ip address\
    \ 10.2.2.1 255.255.255.252\n no shutdown\n!\nrouter bgp 65002\n neighbor 10.0.2.1\
    \ remote-as 65000\n neighbor 10.2.1.2 remote-as 65002\n neighbor 10.2.2.2 remote-as\
    \ 65002\n!\nend\n"
  spine4: '## AS 65002 pod2 spine4 (Juniper JunOS, set format)

    set system host-name spine4

    set interfaces lo0 unit 0 family inet address 10.255.2.2/32

    set interfaces ge-0/0/0 description to-core2

    set interfaces ge-0/0/0 unit 0 family inet address 10.0.4.2/30

    set interfaces ge-0/0/1 description to-leaf3

    set interfaces ge-0/0/1 unit 0 family inet address 10.2.3.1/30

    set interfaces ge-0/0/2 description to-leaf4

    set interfaces ge-0/0/2 unit 0 family inet address 10.2.4.1/30

    set routing-options autonomous-system 65002

    set protocols bgp group ext type external

    set protocols bgp group ext neighbor 10.0.4.1 peer-as 65000

    set protocols bgp group ibgp type internal

    set protocols bgp group ibgp neighbor 10.2.3.2 peer-as 65002

    set protocols bgp group ibgp neighbor 10.2.4.2 peer-as 65002

    '
