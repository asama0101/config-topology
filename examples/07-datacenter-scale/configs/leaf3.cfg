!
! AS 65002 pod2 leaf3 (Cisco IOS)
!
hostname leaf3
!
interface Loopback0
 ip address 10.255.2.11 255.255.255.255
!
interface GigabitEthernet0/0
 description to-spine3
 ip address 10.2.1.2 255.255.255.252
 no shutdown
!
interface GigabitEthernet0/1
 description to-spine4
 ip address 10.2.3.2 255.255.255.252
 no shutdown
!
interface GigabitEthernet0/2
 description server-lan
 ip address 192.168.13.1 255.255.255.0
 no shutdown
!
router bgp 65002
 neighbor 10.2.1.1 remote-as 65002
 neighbor 10.2.3.1 remote-as 65002
!
end
