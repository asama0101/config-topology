## AS 65001 pod1 leaf2 (Juniper JunOS, set format)
set system host-name leaf2
set interfaces lo0 unit 0 family inet address 10.255.1.12/32
set interfaces ge-0/0/0 description to-spine1
set interfaces ge-0/0/0 unit 0 family inet address 10.1.2.2/30
set interfaces ge-0/0/1 description to-spine2
set interfaces ge-0/0/1 unit 0 family inet address 10.1.4.2/30
set interfaces ge-0/0/2 description server-lan
set interfaces ge-0/0/2 unit 0 family inet address 192.168.12.1/24
set routing-options autonomous-system 65001
set protocols bgp group ibgp type internal
set protocols bgp group ibgp neighbor 10.1.2.1 peer-as 65001
set protocols bgp group ibgp neighbor 10.1.4.1 peer-as 65001
