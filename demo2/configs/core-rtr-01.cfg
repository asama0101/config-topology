!
hostname core-rtr-01
!
interface Loopback0
 ip address 10.10.0.1 255.255.255.255
 ipv6 address 2001:DB8:10::1/128
!
interface GigabitEthernet0/0
 description core01-to-core02
 mtu 9000
 ip address 10.10.12.1 255.255.255.252
 ipv6 address 2001:DB8:10:12::1/64
 ip ospf cost 10
 ip ospf network point-to-point
!
interface GigabitEthernet0/1
 description core01-to-dist
 mtu 1500
 ip address 10.10.13.1 255.255.255.252
!
interface GigabitEthernet0/2
 description core01-to-edge
 ip address 10.10.14.1 255.255.255.252
!
interface GigabitEthernet0/3
 description CORE-LAN
 ip address 192.168.1.1 255.255.255.0
!
router ospf 1
 router-id 10.10.0.1
 passive-interface GigabitEthernet0/3
 network 10.10.0.1 0.0.0.0 area 0
 network 10.10.12.0 0.0.0.3 area 0
 network 10.10.13.0 0.0.0.3 area 0
 network 10.10.14.0 0.0.0.3 area 0
 network 192.168.1.0 0.0.0.255 area 0
!
router bgp 65010
 bgp router-id 10.10.0.1
 neighbor RRC peer-group
 neighbor RRC remote-as 65010
 neighbor RRC update-source Loopback0
 neighbor RRC route-reflector-client
 neighbor RRC next-hop-self
 neighbor RRC timers 10 30
 neighbor RRC send-community both
 neighbor 10.10.0.2 peer-group RRC
 neighbor 10.10.0.3 peer-group RRC
 neighbor 10.10.0.4 peer-group RRC
 redistribute connected
 redistribute static metric 100
!
end
