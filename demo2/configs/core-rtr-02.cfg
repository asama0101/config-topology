!
hostname core-rtr-02
!
interface Loopback0
 ip address 10.10.0.2 255.255.255.255
!
interface GigabitEthernet0/0
 description core02-to-core01
 mtu 9000
 ip address 10.10.12.2 255.255.255.252
 ipv6 address 2001:DB8:10:12::2/64
 ip ospf cost 10
 ip ospf network point-to-point
!
interface GigabitEthernet0/1
 description MGMT
 ip address 10.10.99.9 255.255.255.0
!
router ospf 1
 router-id 10.10.0.2
 network 10.10.0.2 0.0.0.0 area 0
 network 10.10.12.0 0.0.0.3 area 0
!
router bgp 65010
 bgp router-id 10.10.0.2
 neighbor 10.10.0.1 remote-as 65010
 neighbor 10.10.0.1 update-source Loopback0
!
end
