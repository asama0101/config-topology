!
hostname edge1
!
interface Loopback0
 description edge1 router-id
 ip address 10.255.0.4 255.255.255.255
!
interface GigabitEthernet0/0
 description P2P link to core1
 ip address 10.0.1.2 255.255.255.252
!
interface GigabitEthernet0/1
 description access stub LAN (edge1 単独 = stub)
 ip address 192.168.40.1 255.255.255.0
!
router ospf 1
 router-id 10.255.0.4
 network 10.0.1.0 0.0.0.3 area 0
 network 10.255.0.4 0.0.0.0 area 1
 network 192.168.40.0 0.0.0.255 area 1
!
router bgp 65000
 bgp router-id 10.255.0.4
 neighbor 10.255.0.1 remote-as 65000
 neighbor 10.255.0.1 update-source Loopback0
!
end
